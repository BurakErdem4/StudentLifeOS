        const DEFAULT_REWARDS = [

            { id: 8, title: "Yeni Kitap", cost: 150, icon: "📚" },
            { id: 9, title: "Film Gecesi", cost: 80, icon: "🍿" },
            { id: 10, title: "Tembellik Hakkı", cost: 50, icon: "🦥" }
        ];
        const DEFAULT_HABITS = [
            { id: 'h1', title: 'Yatağı Topla', icon: '🛏️' },
            { id: 'h2', title: 'Kitap Oku', icon: '📖' },
            { id: 'h3', title: 'Yarınını Planla', icon: '📋' },
            { id: 'h4', title: 'Alarmı Erteleme', icon: '⏰' }
        ];

        function AuthScreen() {
            const [isLogin, setIsLogin] = useState(true);
            const [role, setRole] = useState('student');
            const [name, setName] = useState("");
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [parentCode, setParentCode] = useState("");
            const [error, setError] = useState("");
            const [loading, setLoading] = useState(false);

            const handleAuth = async (e) => {
                e.preventDefault();
                setError("");
                setLoading(true);
                try {
                    let userCredential;
                    if (isLogin) {
                        userCredential = await auth.signInWithEmailAndPassword(email, password);
                    } else {
                        // Veli kodu doğrulama
                        if (role === 'parent') {
                            if (!parentCode.trim()) { setError('Lütfen öğrenci kodunu girin.'); setLoading(false); return; }

                            // 1. Önce hesabı oluştur (authenticated olmadan DB sorgusu yapılamaz)
                            userCredential = await auth.createUserWithEmailAndPassword(email, password);

                            // 2. Şimdi authenticated olarak kodu doğrula
                            try {
                                const snap = await db.ref('users').orderByChild('pairingCode').equalTo(parentCode.trim().toUpperCase()).once('value');
                                if (!snap.exists()) {
                                    // Kod geçersiz → hesabı sil
                                    await userCredential.user.delete();
                                    setError('Geçersiz Öğrenci Kodu. Lütfen kodunuzu kontrol edin.');
                                    setLoading(false);
                                    return;
                                }
                                const linkedStudentId = Object.keys(snap.val())[0];

                                await db.ref(`users/${userCredential.user.uid}/profile`).set({
                                    name: name || 'Veli',
                                    email: email,
                                    role: 'parent',
                                    linkedStudentId: linkedStudentId
                                });
                            } catch (queryErr) {
                                // Sorgu hatası → hesabı sil
                                await userCredential.user.delete();
                                throw queryErr;
                            }
                        } else {
                            userCredential = await auth.createUserWithEmailAndPassword(email, password);
                            await db.ref(`users/${userCredential.user.uid}/profile`).set({
                                name: name || 'User',
                                email: email,
                                role: role
                            });
                            // Auto-seed for new students
                            if (role === 'student') {
                                await db.ref(`users/${userCredential.user.uid}`).update({
                                    habits: DEFAULT_HABITS,
                                    rewards: DEFAULT_REWARDS,
                                    gold: 0
                                });
                            }
                        }
                    }
                } catch (err) {
                    setError(err.message.replace("Firebase:", "").trim());
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="flex flex-col items-center justify-center h-full bg-gray-900 text-white p-6">
                    <div className="w-full max-w-sm bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700">
                        <h1 className="text-3xl font-thin tracking-widest text-center mb-2">mylifeOS</h1>
                        <p className="text-gray-400 text-center text-xs tracking-wide mb-8">CLOUD EDITION</p>

                        <form onSubmit={handleAuth} className="space-y-4">
                            {!isLogin && (
                                <>
                                    <div className="flex bg-gray-700 rounded-lg p-1 mb-2">
                                        <button type="button" onClick={() => setRole('student')} className={`flex-1 py-1 rounded text-xs font-bold ${role === 'student' ? 'bg-indigo-600 text-white' : 'text-gray-400'}`}>Öğrenci</button>
                                        <button type="button" onClick={() => setRole('mentor')} className={`flex-1 py-1 rounded text-xs font-bold ${role === 'mentor' ? 'bg-green-600 text-white' : 'text-gray-400'}`}>Mentor</button>
                                        <button type="button" onClick={() => setRole('parent')} className={`flex-1 py-1 rounded text-xs font-bold ${role === 'parent' ? 'bg-amber-500 text-white' : 'text-gray-400'}`}>Veli</button>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 ml-1">İSİM</label>
                                        <input type="text" required className="w-full bg-gray-700 text-white p-3 rounded-xl mt-1 focus:ring-2 ring-indigo-500 border-none" value={name} onChange={e => setName(e.target.value)} />
                                    </div>
                                    {role === 'parent' && (
                                        <div>
                                            <label className="text-xs font-bold text-gray-500 ml-1">ÖĞRENCİ KODU</label>
                                            <input type="text" required maxLength={6} placeholder="6 haneli kod" className="w-full bg-gray-700 text-white p-3 rounded-xl mt-1 focus:ring-2 ring-amber-500 border-none uppercase tracking-widest text-center font-mono font-bold text-lg" value={parentCode} onChange={e => setParentCode(e.target.value.toUpperCase())} />
                                            <p className="text-gray-500 text-[10px] mt-1 ml-1">Öğrencinizin profilindeki 6 haneli kodu girin</p>

                                    )}

                            )}
                            <div>

                                <input type="email" required className="w-full bg-gray-700 text-white p-3 rounded-xl mt-1 focus:ring-2 ring-indigo-500 border-none" value={email} onChange={e => setEmail(e.target.value)} />

                                <input type="password" required className="w-full bg-gray-700 text-white p-3 rounded-xl mt-1 focus:ring-2 ring-indigo-500 border-none" value={password} onChange={e => setPassword(e.target.value)} />
                            </div>

                            {error && <div className="text-red-400 text-xs bg-red-900/30 p-2 rounded">{error}</div>}

                            <button disabled={loading} type="submit" className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl transition-all disabled:opacity-50">
                                {loading ? 'İşleniyor...' : (isLogin ? 'Giriş Yap' : 'Kayıt Ol')}
                            </button>
                        </form>

                        <div className="mt-6 text-center">
                            <button onClick={() => setIsLogin(!isLogin)} className="text-gray-400 text-sm hover:text-white transition">
                                {isLogin ? 'Hesabın yok mu? Kayıt Ol' : 'Zaten hesabın var mı? Giriş Yap'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }



        // --- 6 RENKLİ SİSTEM YARDIMCISI (Color + Text) ---
        const getStatusInfo = (percent, hasTasks) => {
            if (!hasTasks) return { color: "#F3F4F6", text: "Plan Yok", textColor: "#9CA3AF" }; // Boş
            if (percent === 0) return { color: "#9CA3AF", text: "Henüz Başlamadın...", textColor: "white" }; // Gri (0%)
            if (percent <= 20) return { color: "#EF4444", text: "Harekete Geç!", textColor: "white" }; // Kırmızı
            if (percent <= 40) return { color: "#F97316", text: "Isınıyorsun 🔥", textColor: "white" }; // Turuncu
            if (percent <= 60) return { color: "#EAB308", text: "Yarıladın 🚀", textColor: "white" }; // Sarı
            if (percent < 100) return { color: "#22C55E", text: "Harika Gidiyorsun", textColor: "white" }; // Yeşil
            return { color: "#06B6D4", text: "Efsane Bir Gün 💎", textColor: "white" }; // Turkuaz
        };

        const getProgressColor = (percent) => getStatusInfo(percent, true).color;

        // --- ANALYTICS COMPONENT ---
        const ProjectAnalyticsChart = ({ student }) => {
            const canvasRef = React.useRef(null);
            const [range, setRange] = useState('1m'); // 1w, 1m, 3m, 6m
            const [metric, setMetric] = useState('cumulative'); // 'cumulative' | 'velocity'
            const [chartOffset, setChartOffset] = useState(0); // 0 = current, -1 = prev window
            const [activeFilter, setActiveFilter] = useState('ALL'); // 'ALL' | project.id
            const chartInstance = React.useRef(null);

            // Techy/Dark Mode Colors
            const colors = ['#818cf8', '#f472b6', '#fbbf24', '#34d399', '#60a5fa'];

            // Reset offset when range changes
            useEffect(() => {
                setChartOffset(0);
            }, [range]);

            useEffect(() => {
                if (!student || !student.projects || student.projects.length === 0) return;
                const ctx = canvasRef.current.getContext('2d');

                const getDateKey = (date) => {
                    const year = date.getFullYear();
                    const month = String(date.getMonth() + 1).padStart(2, '0');
                    const day = String(date.getDate()).padStart(2, '0');
                    return `${year}-${month}-${day}`;
                };

                // 1. Determine Date Range based on Offset
                let days = 30;
                if (range === '1w') days = 7;
                if (range === '1m') days = 30;
                if (range === '3m') days = 90;
                if (range === '6m') days = 180;

                const now = new Date();
                // End of the window: Current Now shifted by offset * duration
                const endDate = new Date(now);
                endDate.setDate(endDate.getDate() + (chartOffset * days));

                // Start of the window: End - duration
                const startDate = new Date(endDate);
                startDate.setDate(startDate.getDate() - days);

                // 2. Prepare Data Structure
                const labels = [];
                const projectData = {};

                // Init project data containers
                student.projects.forEach((p, i) => {
                    projectData[p.id] = {
                        id: p.id,
                        label: p.title,
                        data: [],
                        rawValues: [], // For tooltip
                        totalUnit: p.totalUnit || 100,
                        unit: p.unit || 'br',
                        borderColor: colors[i % colors.length],
                        backgroundColor: colors[i % colors.length] + '20', // Default weak fill
                        borderWidth: 2,
                        pointRadius: 0, // Clean line
                        pointHoverRadius: 6,
                        tension: 0.4, // Smooth curves
                        currentRawTotal: 0
                    };
                });

                // 3. Process History
                const allDates = [];
                const iterator = new Date(startDate);
                while (iterator <= endDate) {
                    allDates.push(new Date(iterator));
                    iterator.setDate(iterator.getDate() + 1);
                }

                // 3a. Calculate Initial State (Sum of all tasks BEFORE startDate)
                const projectInitialTotals = {};
                student.projects.forEach(p => projectInitialTotals[p.id] = 0);

                if (metric === 'cumulative') {
                    const startKey = getDateKey(startDate);
                    const historyKeys = Object.keys(student.history || {}).sort();

                    historyKeys.forEach(k => {
                        if (k < startKey) {
                            const dayData = student.history[k];
                            if (dayData && dayData.tasks) {
                                student.projects.forEach(p => {
                                    const gained = dayData.tasks
                                        .filter(t => t.pid === p.id && t.completed)
                                        .reduce((acc, t) => acc + (t.targetAmount || 0), 0);
                                    projectInitialTotals[p.id] += gained;
                                });
                            }
                        }
                    });
                }

                // Initialize currentRawTotal with what was done before this window + initialUnit
                student.projects.forEach(p => {
                    projectData[p.id].currentRawTotal = projectInitialTotals[p.id] + (Number(p.initialUnit) || 0);
                });

                // 3b. Process Dates in Window
                allDates.forEach(date => {
                    const k = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
                    labels.push(date.toLocaleDateString('tr-TR', { day: 'numeric', month: 'short' }));

                    const dayData = (student.history && student.history[k]) ? student.history[k] : { tasks: [] };

                    student.projects.forEach(p => {
                        const gainedToday = (dayData.tasks || [])
                            .filter(t => t.pid === p.id && t.completed)
                            .reduce((acc, t) => acc + (t.targetAmount || 0), 0);

                        projectData[p.id].currentRawTotal += gainedToday;

                        // DATA LOGIC: Cumulative vs Velocity
                        if (metric === 'cumulative') {
                            // Cumulative %
                            const pct = Math.min(100, (projectData[p.id].currentRawTotal / projectData[p.id].totalUnit) * 100);
                            projectData[p.id].data.push(pct);
                            projectData[p.id].rawValues.push(projectData[p.id].currentRawTotal);
                        } else {
                            // Velocity % (Daily Increment)
                            const dailyPct = (gainedToday / projectData[p.id].totalUnit) * 100;
                            projectData[p.id].data.push(dailyPct);
                            projectData[p.id].rawValues.push(gainedToday);
                        }
                    });
                });

                // --- FILTER LOGIC ---
                let filteredDatasets = Object.values(projectData);
                if (activeFilter !== 'ALL') {
                    filteredDatasets = filteredDatasets.filter(ds => ds.id === activeFilter);
                }

                // 4. Create Chart
                if (chartInstance.current) chartInstance.current.destroy();

                // Y-Axis Scale Logic
                let yMin = 0;
                let yMax = 100;

                if (metric === 'cumulative') {
                    // --- RELATIVE TIERED SCALING (Cumulative) ---
                    let startValue = 100;
                    let hasData = false;

                    filteredDatasets.forEach(ds => {
                        if (ds.data.length > 0) {
                            const val = ds.data[0];
                            if (val < startValue) startValue = val;
                            hasData = true;
                        }
                    });
                    if (!hasData) startValue = 0;

                    let currentMax = 0;
                    filteredDatasets.forEach(ds => {
                        const dsMax = Math.max(...ds.data);
                        if (dsMax > currentMax) currentMax = dsMax;
                    });

                    let baseRange = 15;
                    if (range === '1w') baseRange = 5;
                    if (range === '1m') baseRange = 15;
                    if (range === '3m') baseRange = 40;
                    if (range === '6m') baseRange = 80;

                    const actualDelta = currentMax - startValue;
                    let targetRange = baseRange;
                    let attempts = 0;
                    while (actualDelta > targetRange && attempts < 50) {
                        targetRange = targetRange * 1.2;
                        attempts++;
                    }

                    yMin = startValue;
                    yMax = Math.min(startValue + targetRange, 100);

                } else {
                    // --- VELOCITY SCALING (Fixed Baseline 12) ---
                    // If max > 12, Chart.js auto-scales. If max < 12, it stays 0-12.
                    yMax = undefined;
                }

                // Volume Style for Velocity
                filteredDatasets.forEach(ds => {
                    if (metric === 'velocity') {
                        ds.fill = true;
                    }
                });

                chartInstance.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels,
                        datasets: filteredDatasets
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            mode: 'index',
                            intersect: false,
                        },
                        scales: {
                            y: {
                                beginAtZero: metric === 'velocity',
                                min: yMin,
                                max: yMax, // Undefined for Velocity (auto-scale)
                                suggestedMax: metric === 'velocity' ? 12 : undefined, // Baseline 12
                                grid: { color: 'rgba(255,255,255,0.05)' }, // Dark mode grid
                                ticks: { color: '#9ca3af' },
                                border: { display: false }
                            },
                            x: {

                                        return `${dataset.label}: ${Math.round(raw)}/${dataset.totalUnit} ${dataset.unit}`;
                                    }
                                }
                            }
                        }
                    }
                });

                return () => {
                    if (chartInstance.current) chartInstance.current.destroy();
                };

                                    onClick={() => setConfirmModal({ ...confirmModal, open: false })}
                                    className="px-4 py-2 text-gray-500 font-bold hover:bg-gray-100 rounded-lg transition text-sm"
                                >
                                    İptal
                                </button>
                                <button
                                    onClick={() => {
                                        if (confirmModal.onConfirm) confirmModal.onConfirm();
                                        setConfirmModal({ ...confirmModal, open: false });
                                    }}
                                    className={`px-4 py-2 font-bold rounded-lg transition text-sm shadow-lg ${confirmModal.type === 'danger' ? 'bg-red-600 hover:bg-red-700 text-white shadow-red-200' : 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-indigo-200'}`}
                                >
                                    Onayla
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const usersSnap = await db.ref('users').once('value');
                        const users = [];
                        let totalUsers = 0;
                        usersSnap.forEach(child => {
                            totalUsers++;
                            const val = child.val();
                            if (val && val.profile && val.profile.role && val.profile.role.toLowerCase() === 'student') {
                                users.push({ uid: child.key, ...val });
                            }
                        });
                        // Fetch Classes
                        // MOVED TO users/school_metadata due to permission issues on root /classes
                        const classesSnap = await db.ref('users/school_metadata/classes').once('value');
                        const classesList = [];
                        if (classesSnap.exists()) {
                            classesSnap.forEach(child => {
                                classesList.push({ id: child.key, ...child.val() });
                            });
                        }

                        console.log(`Debug: Found ${totalUsers} total users, ${users.length} students.`);
                        setStudents(users);
                        setClasses(classesList);
                    } catch (error) {
                        console.error("Fetch Error:", error);
                        alert("Veri çekme hatası: " + error.message);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchData();
            }, []);

            const createClass = () => {
                if (!newClassName) return;
                // MOVED PATH
                const newRef = db.ref('users/school_metadata/classes').push();
                newRef.set({ name: newClassName, createdAt: Date.now() });
                setClasses([...classes, { id: newRef.key, name: newClassName }]);
                setNewClassName('');
            };

            const createTestStudent = async () => {
                const newRef = db.ref('users').push();
                const testData = {
                    profile: { name: "Test Öğrenci", email: "test@student.com", role: "student", storeLocked: false },
                    gold: 100,
                    history: {}
                };
                await newRef.set(testData);
                setStudents([...students, { uid: newRef.key, ...testData }]);
            };

            const calculateRisk = (student) => {
                const todayKey = new Date().getFullYear() + '-' + String(new Date().getMonth() + 1).padStart(2, '0') + '-' + String(new Date().getDate()).padStart(2, '0');
                const todayData = student.history && student.history[todayKey];
                const tasks = todayData ? (todayData.tasks || []) : [];

                if (tasks.length === 0) return { color: "border-gray-200", bg: "bg-gray-50", text: "Veri Yok" };

                let doneCount = 0;
                tasks.forEach(t => {
                    if (t.subItems && t.subItems.length) {
                        doneCount += (t.subItems.filter(Boolean).length / t.subItems.length);
                    } else if (t.completed) {
                        doneCount += 1;
                    }
                });

                const percent = (doneCount / tasks.length) * 100;
                if (percent < 40) return { color: "border-red-500", bg: "bg-red-50", text: "Riskli" };
                if (percent < 60) return { color: "border-orange-500", bg: "bg-orange-50", text: "Dikkat" };
                if (percent < 80) return { color: "border-yellow-500", bg: "bg-yellow-50", text: "İyi" };
                return { color: "border-green-500", bg: "bg-green-50", text: "Harika" };
            };

            const calculateScore = (student) => {
                const totalGoals = (student.projects || []).reduce((acc, p) => acc + (Number(p.totalUnit) || 0), 0);
                const completedGoals = (student.projects || []).reduce((acc, p) => acc + (Number(p.currentUnit) || 0), 0);
                return totalGoals > 0 ? Math.round((completedGoals / totalGoals) * 1000) : 0;
            };



            // --- MOCK DATA SEEDING (FOR DEMO) ---
            const handleSeedMockData = async (e) => {
                if (e && e.preventDefault) e.preventDefault();

                setConfirmModal({
                    open: true,
                    title: 'Mock Data Yükle (Pro)',
                    message: 'Gerçek YKS şablonları kullanılarak 3 öğrenci (Can, Zeynep, Emre) oluşturulacak.\nBu işlem mevcut mock verileri üzerine yazabilir.',
                    onConfirm: async () => {
                        setLoading(true);

                        // 1. Bizim hazırladığımız gerçek şablonları bulalım
                        const tytBundle = STUDY_TEMPLATES.find(t => t.id === 'bundle_tyt_genel');
                        const aytBundle = STUDY_TEMPLATES.find(t => t.id === 'bundle_ayt_sayisal');

                        // Eğer şablonlar tanımlı değilse hata vermesin
                        if (!tytBundle || !aytBundle) {
                            alert("Hata: Hazır şablonlar bulunamadı. Lütfen önce STUDY_TEMPLATES verisini kontrol edin.");
                            setLoading(false);
                            return;
                        }

                        // Tüm derslerin listesi (Flat list)
                        const allLessons = [...tytBundle.items, ...aytBundle.items];

                        const mockStudents = [
                            {
                                uid: 'mock_1',
                                name: 'Can Yılmaz',
                                class: '12-A',
                                role: 'student',
                                email: 'can@mock.com',
                                strategy: 'TYT_FOCUS' // Can TYT abanmış
                            },
                            {
                                uid: 'mock_2',
                                name: 'Zeynep Demir',
                                class: '12-A',
                                role: 'student',
                                email: 'zeynep@mock.com',
                                strategy: 'BALANCED' // Zeynep dengeli gidiyor
                            },
                            {
                                uid: 'mock_3',
                                name: 'Emre Çelik',
                                class: '12-B',
                                role: 'student',
                                email: 'emre@mock.com',
                                strategy: 'JUST_STARTED' // Emre yeni başlamış
                            }
                        ];

                        const newUsersData = {};

                        mockStudents.forEach(student => {
                            // --- A. PROJELERİ OLUŞTUR (Gerçek Ders İsimleriyle) ---
                            const studentProjects = allLessons.map((lesson, index) => {
                                // Rastgele ilerleme oranı belirle
                                let progressRate = 0;

                                if (student.strategy === 'TYT_FOCUS') {
                                    // TYT dersleri %40-80 arası, AYT %0-20 arası
                                    const isTYT = lesson.title.includes('TYT');
                                    progressRate = isTYT ? (0.4 + Math.random() * 0.4) : (Math.random() * 0.2);
                                } else if (student.strategy === 'BALANCED') {
                                    // Hepsi %30-60 arası
                                    progressRate = 0.3 + Math.random() * 0.3;
                                } else {
                                    // Yeni başlayan %0-15
                                    progressRate = Math.random() * 0.15;
                                }

                                const current = Math.floor(lesson.totalUnit * progressRate);

                                return {
                                    id: `mock_proj_${student.uid}_${index}`,
                                    title: lesson.title, // "TYT Matematik", "AYT Fizik" vb.
                                    totalUnit: lesson.totalUnit,
                                    currentUnit: current,
                                    unit: lesson.unit,
                                    totalEstTime: lesson.totalEstTime,
                                    notes: lesson.notes || ''
                                };
                            });

                            // --- B. GEÇMİŞ VERİSİ OLUŞTUR (Grafikler Dolu Gözüksün Diye) ---
                            // Son 90 gün (3 ay) için rastgele "tamamlanan görevler" uyduruyoruz
                            const historyData = {};
                            const today = new Date();

                            for (let i = 0; i < 90; i++) {
                                // %20 olasılıkla o gün çalışmasın (Mola günü)
                                if (Math.random() < 0.2) continue;

                                const d = new Date(today);
                                d.setDate(d.getDate() - i);
                                const dateKey = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');

                                // O gün kaç dakika çalışmış olsun? (0 ile 300 dk arası)
                                const workedMinutes = Math.floor(Math.random() * (student.strategy === 'JUST_STARTED' ? 60 : 300));

                                if (workedMinutes > 0) {
                                    // Pick random projects from the student's list
                                    const p1 = studentProjects[Math.floor(Math.random() * studentProjects.length)];
                                    const p2 = studentProjects[Math.floor(Math.random() * studentProjects.length)];

                                    // targetAmount strateji bazlı - günlük çalışma miktarı
                                    const baseAmount = student.strategy === 'TYT_FOCUS' ? 5 :
                                        student.strategy === 'BALANCED' ? 3 : 1;
                                    const amt1 = Math.max(1, Math.floor(baseAmount * (0.5 + Math.random())));
                                    const amt2 = Math.max(1, Math.floor(baseAmount * (0.3 + Math.random() * 0.7)));

                                    historyData[dateKey] = {
                                        tasks: [
                                            {
                                                id: `hist_${i}_1`,
                                                pid: p1.id,
                                                title: `${p1.title} Çalışması`,
                                                completed: true,
                                                duration: Math.floor(workedMinutes * 0.6),
                                                targetAmount: amt1
                                            },
                                            {
                                                id: `hist_${i}_2`,
                                                pid: p2.id,
                                                title: `${p2.title} Tekrarı`,
                                                completed: true,
                                                duration: Math.floor(workedMinutes * 0.4),
                                                targetAmount: amt2
                                            }
                                        ]
                                    };
                                }
                            }

                            // --- B2. PROJE İLERLEMELERİNİ TARİHÇEYLE SENKRONİZE ET ---
                            // Tarihçedeki tamamlanan görevlerden kümülatif ilerlemeyi hesapla
                            const cumulativeProgress = {};
                            Object.values(historyData).forEach(day => {
                                (day.tasks || []).forEach(task => {
                                    if (task.pid && task.completed !== false) {
                                        cumulativeProgress[task.pid] = (cumulativeProgress[task.pid] || 0) + (task.targetAmount || 0);
                                    }
                                });
                            });

                            // Her projenin currentUnit'ını tarihçeyle eşitle (totalUnit'ı aşmasın)
                            studentProjects.forEach(p => {
                                const fromHistory = cumulativeProgress[p.id] || 0;
                                p.currentUnit = Math.min(p.totalUnit, fromHistory);
                            });

                            // --- C. KULLANICIYI PAKETLE ---
                            newUsersData[`users/${student.uid}`] = {
                                profile: {
                                    name: student.name,
                                    email: student.email,
                                    role: student.role,
                                    classId: student.class === '12-A' ? 'class_12a' : 'class_12b',
                                    isMock: true
                                },
                                projects: studentProjects,
                                history: historyData,
                                gold: Math.floor(Math.random() * 500),
                                habits: [],
                                rewards: []
                            };
                        });

                        // Ensure Classes Exist too
                        newUsersData['users/school_metadata/classes/class_12a'] = { name: '12-A', createdAt: Date.now() };
                        newUsersData['users/school_metadata/classes/class_12b'] = { name: '12-B', createdAt: Date.now() };

                        // Veritabanına Yaz
                        try {
                            await db.ref().update(newUsersData);
                            alert('✅ 3 Adet YKS Öğrencisi (Can, Zeynep, Emre) başarıyla yüklendi!\nSayfayı yenileyip Mentor Paneli\'ne bakın.');
                            window.location.reload();
                        } catch (error) {
                            console.error(error);
                            alert('Mock data yüklenirken hata oluştu: ' + error.message);
                        } finally {
                            setLoading(false);
                        }
                    }
                });
            };

            // Filter & Sort Logic
            let displayedStudents = students;

            // 1. Filter by View (Class)
            if (view !== 'all' && view !== 'classes') {
                displayedStudents = students.filter(s => s.profile.classId === view);
            }

            // 2. Filter by Search Term
            if (searchTerm) {
                const lowerTerm = searchTerm.toLowerCase();
                displayedStudents = displayedStudents.filter(s =>
                    (s.profile.name || '').toLowerCase().includes(lowerTerm) ||
                    (s.profile.email || '').toLowerCase().includes(lowerTerm)
                );
            }

            // 3. Sort by Score (Descending)
            displayedStudents.sort((a, b) => calculateScore(b) - calculateScore(a));


            if (selectedStudent) {
                return <StudentDetailModal student={selectedStudent} classes={classes} onClose={() => setSelectedStudent(null)} />;
            }

            return (
                <div className="flex flex-col h-full bg-gray-50 text-gray-800">
                    <ConfirmationModal />
                    <div className="bg-white p-6 shadow-sm border-b border-gray-200">
                        <div className="flex justify-between items-center mb-6">
                            <div className="flex items-center gap-3">
                                <h1 className="text-2xl font-bold text-gray-900">Mentor Paneli</h1>
                                <DevTools openConfirm={(title, message, onConfirm, type) => setConfirmModal({ open: true, title, message, onConfirm, type })} onSeedMockData={handleSeedMockData} />
                            </div>
                            <button type="button" onClick={() => auth.signOut()} className="text-xs font-bold text-red-500 hover:bg-red-50 px-3 py-1.5 rounded-lg border border-red-100 transition">ÇIKIŞ</button>
                        </div>
                        <div className="flex flex-col sm:flex-row gap-4 mb-4">
                            <div className="flex bg-gray-100 p-1 rounded-xl flex-1">
                                <button onClick={() => setView('all')} className={`flex-1 py-2 rounded-lg text-sm font-bold transition ${view === 'all' ? 'bg-white text-indigo-600 shadow-sm' : 'text-gray-400'}`}>Tüm Öğrenciler</button>
                                <button onClick={() => setView('classes')} className={`flex-1 py-2 rounded-lg text-sm font-bold transition ${view === 'classes' ? 'bg-white text-indigo-600 shadow-sm' : 'text-gray-400'}`}>Sınıflar</button>
                            </div>
                            {/* Search Input */}
                            {(view === 'all' || (view !== 'classes' && view !== 'all')) && (
                                <div className="relative flex-1">
                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                                    </div>
                                    <input
                                        type="text"
                                        placeholder="Öğrenci ara..."
                                        className="w-full bg-gray-50 border border-gray-200 rounded-xl py-2 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-100 focus:border-indigo-300 transition"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 sm:p-6">
                        {loading ? <div className="text-center text-gray-400 py-10">Yükleniyor...</div> : (
                            <>
                                {view === 'classes' ? (
                                    <div className="space-y-6">
                                        <div className="bg-white p-4 rounded-xl border border-gray-200">
                                            <h3 className="text-sm font-bold text-gray-600 mb-3">YENİ SINIF OLUŞTUR</h3>
                                            <div className="flex gap-2">
                                                <input placeholder="Sınıf Adı (Örn: 12-A)" className="flex-1 bg-gray-50 border border-gray-200 rounded-lg p-2 text-sm" value={newClassName} onChange={e => setNewClassName(e.target.value)} />
                                                <button onClick={createClass} className="bg-indigo-600 text-white px-4 rounded-lg font-bold text-sm hover:bg-indigo-700">+ Ekle</button>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            {classes.map(c => (
                                                <button key={c.id} onClick={() => setView(c.id)} className="p-4 bg-white border border-gray-200 rounded-xl hover:border-indigo-400 hover:shadow-md transition text-left">
                                                    <div className="font-bold text-lg text-gray-800">{c.name}</div>
                                                    <div className="text-xs text-gray-400">{students.filter(s => s.profile.classId === c.id).length} Öğrenci</div>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        {view !== 'all' && <button onClick={() => setView('classes')} className="text-xs font-bold text-indigo-500 mb-2 hover:underline">← Sınıflara Dön</button>}
                                        {displayedStudents.map(s => {
                                            const risk = calculateRisk(s);
                                            const sClass = classes.find(c => c.id === s.profile.classId);
                                            const score = calculateScore(s);

                                            return (
                                                <div key={s.uid} onClick={() => setSelectedStudent(s)} className={`bg-white p-4 rounded-xl border-l-[4px] shadow-sm hover:translate-x-1 hover:shadow-md transition cursor-pointer flex items-center justify-between ${risk.color}`}>
                                                    <div className="flex items-center gap-4">
                                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-white text-sm ${risk.bg.replace('50', '500').replace('text', 'bg')}`}>{s.profile.name.charAt(0)}</div>
                                                        <div>
                                                            <h3 className="font-bold text-gray-800 text-sm">{s.profile.name}</h3>
                                                            <div className="text-[10px] text-gray-400">{sClass ? sClass.name : 'Sınıfsız'} • {s.profile.email}</div>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-3">
                                                        <div className={`text-[10px] font-bold px-2 py-0.5 rounded ${risk.bg} ${risk.color.replace('border', 'text')}`}>{risk.text}</div>
                                                        <div className="text-[10px] font-bold text-gray-400">{score}‰</div>
                                                        <Icons.ChevronRight />
                                                    </div>
                                                </div>
                                            )
                                        })}
                                        {displayedStudents.length === 0 && (
                                            <div className="text-center text-gray-400 py-10 flex flex-col items-center gap-3">
                                                <span>{searchTerm ? `"${searchTerm}" için sonuç bulunamadı.` : 'Bu görünümde öğrenci yok.'}</span>
                                                {!searchTerm && <button onClick={createTestStudent} className="px-4 py-2 bg-indigo-50 text-indigo-600 rounded-lg text-xs font-bold border border-indigo-100 hover:bg-indigo-100">+ Test Öğrencisi Oluştur</button>}
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* VERİ YÖNETİMİ - Akordeon */}
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 mt-6 overflow-hidden">
                                    <button onClick={() => setDataAccordionOpen(!dataAccordionOpen)} className="w-full flex items-center gap-3 p-5 hover:bg-gray-50 transition">
                                        <div className="w-9 h-9 bg-emerald-100 rounded-full flex items-center justify-center text-lg">📊</div>
                                        <div className="text-left flex-1">
                                            <h3 className="font-bold text-gray-800 text-sm">Veri Yönetimi</h3>
                                            <p className="text-[10px] text-gray-400">Verileri dışa aktar veya toplu yükleme yap.</p>
                                        </div>
                                        <span className={`text-gray-400 transition-transform duration-200 ${dataAccordionOpen ? 'rotate-180' : ''}`}>▼</span>
                                    </button>
                                    {dataAccordionOpen && (
                                        <div className="px-5 pb-5">
                                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                                                <button
                                                    onClick={() => {
                                                        const filtered = view !== 'all' && view !== 'classes'
                                                            ? students.filter(s => s.profile.classId === view)
                                                            : students;
                                                        const label = view !== 'all' && view !== 'classes' ? view : 'Tum_Siniflar';
                                                        const result = exportAllStudents(filtered, `Sinif_${label}_${new Date().toISOString().slice(0, 10)}`);
                                                        alert(result.message);
                                                    }}
                                                    className="bg-emerald-500 hover:bg-emerald-600 text-white py-3 rounded-xl font-bold text-xs transition flex items-center justify-center gap-2"
                                                >
                                                    📋 Sınıf Listesini Dışa Aktar
                                                </button>
                                                <button
                                                    onClick={() => {
                                                        const result = exportAllStudents(students, `Kurum_Yedek_${new Date().toISOString().slice(0, 10)}`);
                                                        alert(result.message);
                                                    }}
                                                    className="bg-indigo-500 hover:bg-indigo-600 text-white py-3 rounded-xl font-bold text-xs transition flex items-center justify-center gap-2"
                                                >
                                                    🏫 Tüm Kurumu Yedekle
                                                </button>
                                                <label className="bg-gray-50 hover:bg-gray-100 text-gray-600 py-3 rounded-xl font-bold text-xs transition border-2 border-dashed border-gray-300 cursor-pointer flex items-center justify-center gap-2">
                                                    📤 Toplu Öğrenci Yükle
                                                    <input type="file" accept=".xlsx,.xls" className="hidden" onChange={async (e) => {
                                                        const file = e.target.files?.[0];
                                                        if (!file) return;
                                                        try {
                                                            const data = new Uint8Array(await file.arrayBuffer());
                                                            const wb = XLSX.read(data, { type: 'array' });
                                                            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                                                            if (!rows.length) return alert('Hata: Dosya boş veya formatı hatalı.');
                                                            let count = 0;
                                                            const batch = {};
                                                            rows.forEach(r => {
                                                                const name = r['Ad Soyad'] || r['name'] || r['İsim'];
                                                                const email = r['E-posta'] || r['email'] || r['Email'];
                                                                const classId = r['Sınıf'] || r['classId'] || r['class'] || '';
                                                                if (!name) return;
                                                                const uid = db.ref('users').push().key;
                                                                batch[`users/${uid}/profile`] = { name, email: email || '', role: 'student', classId };
                                                                batch[`users/${uid}/gold`] = 0;
                                                                batch[`users/${uid}/projects`] = [];
                                                                count++;
                                                            });
                                                            if (count > 0) {
                                                                await db.ref().update(batch);
                                                                alert(`✅ ${count} öğrenci başarıyla yüklendi!`);
                                                            } else {
                                                                alert('Hata: Geçerli öğrenci satırı bulunamadı. "Ad Soyad" sütunu gerekli.');
                                                            }
                                                        } catch (err) {
                                                            alert('Hata: Dosya okunamadı veya formatı hatalı.');
                                                        }
                                                        e.target.value = '';
                                                    }} />
                                                </label>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </>
                        )}
                    </div>
                </div>
            );
        };

        const AnalysisView = ({ student }) => {
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [dateOffset, setDateOffset] = useState(0);

            const getDateKey = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };

            const getPaginatedDays = () => {
                return Array.from({ length: 10 }).map((_, i) => {
                    const d = new Date();
                    d.setDate(d.getDate() - (9 - i) - (dateOffset * 10));
                    return d;
                });
            };

            const selectedDateKey = getDateKey(selectedDate);
            const selectedDayData = (student.history && student.history[selectedDateKey]) || { tasks: [], habits: [] };
            const daysList = getPaginatedDays();

            return (
                <div className="space-y-6 max-w-2xl mx-auto">
                    {/* 10 Günlük Çizelge */}
                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                        <div className="flex justify-between items-center mb-4">

                                    {selectedDayData.tasks ? Math.round(selectedDayData.tasks.reduce((acc, t) => {

                                        if (t.subItems && t.subItems.length > 0) {
                                            const doneCount = t.subItems.filter(Boolean).length;

                                            </span>
                                            <span className="text-xs font-bold">{displayDuration}dk</span>
                                        </div>
                                    );

                        ) : <div className="text-center text-sm text-gray-400 py-4">Kayıt yok.</div>}
                    </div>

                    <details className="group bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-3">
                        <summary className="flex justify-between items-center font-bold text-gray-600 cursor-pointer text-sm">

                            <div className="group-open:rotate-180 transition"><Icons.ChevronRight /></div>
                        </summary>
                        <div className="mt-4 space-y-3 pl-4 border-l-2 border-gray-100">
                            {daysList.map((d, i) => {

                                if (!hist || !hist.tasks || hist.tasks.length === 0) return null;

                                return (

                                            <span className="text-indigo-600 font-bold">{Math.round(hist.tasks.reduce((acc, t) => {
                                                if (t.completed) return acc + Number(t.duration);
                                                if (t.subItems && t.subItems.length > 0) {
                                                    const doneCount = t.subItems.filter(Boolean).length;
                                                    const progress = doneCount / t.subItems.length;
                                                    return acc + (Number(t.duration) * progress);
                                                }
                                                return acc;
                                            }, 0))}dk</span>
                                        </div>
                                        <div className="space-y-1 pl-2">
                                            {hist.tasks.filter(t => t.completed || (t.subItems && t.subItems.some(Boolean))).map((t, idx) => {
                                                const isPartial = !t.completed && t.subItems && t.subItems.some(Boolean);
                                                let progressText = "";
                                                let displayDuration = t.duration;
                                                if (isPartial) {
                                                    const done = t.subItems.filter(Boolean).length;
                                                    const total = t.subItems.length;
                                                    progressText = ` (${done}/${total})`;
                                                    displayDuration = Math.round(Number(t.duration) * (done / total));
                                                }
                                                return (
                                                    <div key={idx} className="flex items-center gap-1">
                                                        <span className="text-[8px] opacity-50">●</span>
                                                        <span className={`${isPartial ? 'text-orange-500' : ''}`}>{t.title}{progressText} ({displayDuration}dk)</span>
                                                    </div>

                    <details className="group bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                        <summary className="flex justify-between items-center font-bold text-gray-600 cursor-pointer text-sm">
                            <span>🎯 Aktif Büyük Hedefler</span>
                            <div className="group-open:rotate-180 transition"><Icons.ChevronRight /></div>
                        </summary>
                        <div className="mt-4 space-y-2">
                            {(student.projects || []).map(p => {
                                const pct = Math.min(100, Math.round((p.currentUnit / p.totalUnit) * 100));
                                return (
                                    <div key={p.id} className="flex justify-between items-center text-xs">
                                        <span className="font-bold text-gray-600">{p.title}</span>
                                        <div className="flex items-center gap-2 w-1/2">
                                            <div className="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden"><div className="h-full bg-indigo-500" style={{ width: `${pct}%` }}></div></div>
                                            <span className="text-gray-400 text-[10px]">%{pct}</span>
                                        </div>
                                    </div>
                                )
                            })}
                            {(!student.projects || student.projects.length === 0) && <div className="text-xs text-gray-300 italic">Hedef yok.</div>}

        const StudentSimulator = ({ studentId }) => {
            const [student, setStudent] = useState(null);
            const [activeTab, setActiveTab] = useState('planner');
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [modal, setModal] = useState({ open: false, type: null, data: null });
            const [form, setForm] = useState({});
            const [focusMode, setFocusMode] = useState({ active: false, taskId: null, taskTitle: '', timeLeft: 0, isRunning: false });
            const [flippedCards, setFlippedCards] = useState({});
            const [notificationModal, setNotificationModal] = useState(null);
            const [flippedProjects, setFlippedProjects] = useState({});

            useEffect(() => {
                if (!studentId) return;
                const ref = db.ref(`users/${studentId}`);
                const handler = (s) => {
                    const val = s.val();
                    if (val) setStudent({ uid: s.key, ...val });
                };
                ref.on('value', handler);
                return () => ref.off('value', handler);
            }, [studentId]);

            if (!student) return <div className="p-10 text-center text-gray-400">Öğrenci verisi yükleniyor...</div>;

            const updateCloud = (path, value) => {
                db.ref(`users/${student.uid}/${path}`).set(value);
            };

            const getDateKey = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };

            const dateKey = getDateKey(selectedDate);
            const todayKey = getDateKey(new Date());
            const history = student.history || {};
            const projects = student.projects || [];
            const habits = student.habits || [];
            const rewards = student.rewards || [];
            const gold = student.gold || 0;
            const profile = student.profile || {};
            const currentDayData = history[dateKey] || { tasks: [], habits: [] };

            // --- Handlers Replicated from App ---
            const closeNotification = () => {
                setNotificationModal(null);
            };

            const handleAddProject = () => {
                if (form.title) {
                    const initial = Number(form.initial) || 0;
                    const newProject = {
                        id: Date.now(),
                        title: form.title,
                        totalUnit: form.total || 100,
                        unit: form.unit || 'Birim',
                        currentUnit: initial,
                        totalEstTime: form.estTime || 0,
                        notes: ''
                    };
                    updateCloud('projects', [...projects, newProject]);
                    if (initial > 0) {
                        // Log initial progress to today
                        const logId = Date.now() + 1;
                        const logTask = {
                            id: logId,
                            title: `${form.title} (Başlangıç)`,
                            duration: 0,
                            type: 'project_log',
                            completed: true,
                            pid: newProject.id,
                            targetAmount: initial
                        };
                        updateCloud(`history/${dateKey}/tasks`, [...(currentDayData.tasks || []), logTask]);
                    }
                    setModal({ open: false });
                }
            };

            const handleEditProject = () => {
                if (!modal.data) return;
                const updated = projects.map(p => {
                    if (p.id === modal.data.id) {
                        return {
                            ...p,
                            title: form.title || p.title,
                            totalUnit: form.total || p.totalUnit,
                            unit: form.unit || p.unit,
                            currentUnit: form.current !== undefined ? Number(form.current) : p.currentUnit,
                            totalEstTime: form.estTime || p.totalEstTime
                        };
                    }
                    return p;
                });
                updateCloud('projects', updated);
                setModal({ open: false });
            };

            const handleAddTask = (type) => {
                let newTask;
                if (type === 'simple') {
                    newTask = { id: Date.now(), title: form.title, type: 'simple', completed: false, duration: form.time || '30', startTime: form.startTime || '' };
                } else if (type === 'import') {
                    const p = modal.data || projects.find(pro => String(pro.id) === String(form.projectId));
                    if (!p) return alert("Lütfen bir proje seçin!");
                    const amount = Number(form.amount) || 1;
                    let calculatedDuration = form.time;
                    if (!calculatedDuration && p.totalEstTime && p.totalUnit) {
                        const timePerUnitHours = p.totalEstTime / p.totalUnit;
                        const totalHours = timePerUnitHours * amount;
                        calculatedDuration = Math.round(totalHours * 60);
                    }
                    if (!calculatedDuration) calculatedDuration = '60';
                    newTask = {
                        id: Date.now(), title: `${p.title} (${amount} ${p.unit})`, type: 'project_slice',
                        pid: p.id, targetAmount: amount, subItems: new Array(amount).fill(false), completed: false,
                        duration: String(calculatedDuration), startTime: form.startTime || ''
                    };
                }
                const newTasks = [...(currentDayData.tasks || []), newTask];
                updateCloud(`history/${dateKey}/tasks`, newTasks);
                setModal({ open: false });
            };

            const toggleTask = (taskId) => {
                const task = currentDayData.tasks.find(t => t.id === taskId);
                if (!task) return;
                const newStatus = !task.completed;
                db.ref(`users/${student.uid}/gold`).set((gold || 0) + (newStatus ? 10 : -10));
                const updatedTasks = currentDayData.tasks.map(t => t.id === taskId ? { ...t, completed: newStatus } : t);
                updateCloud(`history/${dateKey}/tasks`, updatedTasks);
            };

            const toggleSubItem = (taskId, index) => {
                const task = currentDayData.tasks.find(t => t.id === taskId);
                if (!task || !task.subItems) return;
                const newSubItems = [...task.subItems];
                const wasDone = newSubItems[index];
                newSubItems[index] = !wasDone;

                if (task.type === 'project_slice') {
                    const targetProject = projects.find(p => p.id === task.pid);
                    if (targetProject) {
                        const newCurrent = Math.min(targetProject.totalUnit, Math.max(0, targetProject.currentUnit + (wasDone ? -1 : 1)));
                        const updatedProjects = projects.map(p => p.id === task.pid ? { ...p, currentUnit: newCurrent } : p);
                        updateCloud('projects', updatedProjects);
                    }
                }
                const allDone = newSubItems.every(i => i === true);
                db.ref(`users/${student.uid}/gold`).set((gold || 0) + (wasDone ? -5 : 5));
                const updatedTasks = currentDayData.tasks.map(t => {
                    if (t.id === taskId) return { ...t, subItems: newSubItems, completed: allDone };
                    return t;
                });
                updateCloud(`history/${dateKey}/tasks`, updatedTasks);
            };

            const deleteTask = (id) => {
                const tasks = currentDayData.tasks || [];
                // Mentor can always delete in simulator
                updateCloud(`history/${dateKey}/tasks`, tasks.filter(t => t.id !== id));
            };

            const addHabit = () => { if (form.title) updateCloud('habits', [...habits, { id: Date.now(), title: form.title, icon: form.icon || '✨' }]); setForm({}); };
            const deleteHabit = (id) => updateCloud('habits', habits.filter(h => h.id !== id));
            const toggleHabit = (hId) => {
                const done = currentDayData.habits || [];
                const isDone = done.includes(hId);
                const newHabits = isDone ? done.filter(id => id !== hId) : [...done, hId];
                updateCloud(`history/${dateKey}/habits`, newHabits);
                // Gold update
                db.ref(`users/${student.uid}/gold`).set(gold + (isDone ? -5 : 5));
            };

            const handleBuyReward = (r) => {
                if (gold >= r.cost) {
                    if (confirm(`${r.title} almak istiyor musun? (${r.cost} Altın)`)) {
                        db.ref(`users/${student.uid}/gold`).set(gold - r.cost);
                        alert("Afiyet olsun! 🍬");
                    }
                } else {
                    alert("Yetersiz Bakiye!");
                }
            };
            const handleAddReward = () => { if (form.title && form.cost) updateCloud('rewards', [...rewards, { id: Date.now(), title: form.title, cost: Number(form.cost), icon: form.icon || '🎁' }]); setForm({}); };
            const handleDeleteReward = (id) => updateCloud('rewards', rewards.filter(r => r.id !== id));


            return (
                <div className="border-4 border-gray-800 rounded-3xl overflow-hidden shadow-2xl relative bg-gray-900">
                    <div className="absolute top-0 left-0 right-0 bg-gray-800 text-center text-[10px] text-gray-500 py-1 font-mono z-50">STUDENT SIMULATOR MODE</div>
                    <div className="pt-6 h-[800px]"> {/* Fixed height container */}
                        <StudentUI
                            user={{ uid: student.uid, email: profile.email }}
                            profile={profile}
                            activeTab={activeTab} setActiveTab={setActiveTab}
                            selectedDate={selectedDate} setSelectedDate={setSelectedDate}
                            projects={projects} history={history} habits={habits} rewards={rewards}
                            gold={gold} flippedCards={flippedCards} setFlippedCards={setFlippedCards}
                            flippedProjects={flippedProjects} setFlippedProjects={setFlippedProjects}
                            focusMode={focusMode} setFocusMode={setFocusMode}
                            modal={modal}
                            openModal={(type, data) => { setModal({ open: true, type, data }); setForm({}); if (type === 'journal') setForm({ mood: currentDayData.journal?.mood || '😐', note: currentDayData.journal?.note || '' }); }}
                            closeModal={() => setModal({ open: false, type: null, data: null })}
                            form={form} setForm={setForm}
                            notificationModal={notificationModal} closeNotification={closeNotification}
                            handleAddProject={handleAddProject}
                            handleEditProject={handleEditProject}
                            handleDeleteProject={(id) => updateCloud('projects', projects.filter(p => p.id !== id))}
                            handleAddTask={handleAddTask}
                            toggleTask={toggleTask}
                            toggleSubItem={toggleSubItem}
                            deleteTask={deleteTask}
                            addHabit={addHabit}
                            deleteHabit={deleteHabit}
                            toggleHabit={toggleHabit}
                            handlePurchase={handleBuyReward}
                            handleAddReward={handleAddReward}
                            handleDeleteReward={handleDeleteReward}
                            handleStartFocus={(t) => setFocusMode({ active: true, taskId: t.id, taskTitle: t.title, timeLeft: Number(t.duration) * 60, isRunning: true })}
                            handleStopFocus={() => setFocusMode({ ...focusMode, active: false })}
                            dateKey={dateKey}
                            todayKey={todayKey}
                            currentDayData={currentDayData}
                            updateCloud={updateCloud}
                        />
                    </div>
                </div>
            );
        };

        const StudentDetailModal = ({ student, classes, onClose }) => {
            const [activeTab, setActiveTab] = useState('analysis');
            const [form, setForm] = useState({});

            const getDateKey = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };



            const handleUpdateClass = (e) => {
                const newClassId = e.target.value;
                db.ref(`users/${student.uid}/profile/classId`).set(newClassId);
                student.profile.classId = newClassId; // Local update
                setForm({ ...form }); // Force render
            };

            const handleAssignTask = () => {
                if (!form.title) return;
                // Use selected date from input OR today if not present
                const targetK = form.assignDate ? form.assignDate : getDateKey(new Date());

                const newTask = {
                    id: Date.now(),
                    title: form.title,
                    duration: form.duration || '30',
                    type: 'simple',
                    completed: false,
                    isMentorTask: true,
                    allowDelete: form.allowDelete === true // Explicitly save permissions
                };

                const currentTasks = (student.history && student.history[targetK] && student.history[targetK].tasks) || [];
                db.ref(`users/${student.uid}/history/${targetK}/tasks`).set([...currentTasks, newTask]);
                setForm({ ...form, title: '', duration: '' });
                alert(`${targetK} tarihine görev atandı!`);
            };

            const toggleStoreLock = () => {
                const newStatus = !student.profile.storeLocked;
                db.ref(`users/${student.uid}/profile/storeLocked`).set(newStatus);
                student.profile.storeLocked = newStatus;
                setForm({ ...form });
            };

            // INTERACTION LOGIC
            const handleInteraction = (type) => {
                let message = "";
                let goldReward = 0;
                let title = "";

                if (type === 'custom') {
                    if (!form.customMsg) return;
                    message = form.customMsg;
                    goldReward = Number(form.goldAmount) || 0;
                    title = "Mentorun Mesajı";
                } else if (type === 'celebrate') {
                    message = form.msgPreset || "Harika iş çıkardın!";
                    goldReward = 50;
                    title = "Tebrikler! 🎉";
                } else if (type === 'motivate') {
                    message = form.msgPreset || "Asla pes etme!";
                    goldReward = 20;
                    title = "Motivasyon 💪";
                }

                // Push notification
                const notifRef = db.ref(`users/${student.uid}/notifications`).push();
                notifRef.set({
                    title,
                    message,
                    gold: goldReward,
                    timestamp: Date.now(),
                    type
                });

                // Update gold atomically
                if (goldReward > 0) {
                    db.ref(`users/${student.uid}/gold`).transaction((currentGold) => {
                        return (currentGold || 0) + goldReward;
                    });
                }

                setForm({ ...form, customMsg: '', goldAmount: '' });
                alert('Etkileşim gönderildi!');
            };



            return (
                <div className="fixed inset-0 bg-white z-50 flex flex-col">
                    <div className="p-4 border-b border-gray-100 flex items-center justify-between bg-white shadow-sm z-10">
                        <div className="flex items-center gap-3">
                            <button onClick={onClose} className="p-2 bg-gray-50 rounded-full hover:bg-gray-100"><Icons.ChevronLeft /></button>
                            <div>
                                <h2 className="font-bold text-lg leading-tight flex items-center gap-2">{student.profile.name} <span className="text-[10px] bg-indigo-50 text-indigo-600 px-2 rounded-full border border-indigo-100">Öğrenci</span></h2>
                                <select className="text-xs text-gray-500 bg-transparent border-none outline-none p-0 cursor-pointer hover:text-indigo-600 transition" value={student.profile.classId || ''} onChange={handleUpdateClass}>
                                    <option value="">Sınıf Seçilmedi</option>
                                    {classes.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                </select>
                            </div>
                        </div>
                        <div className="flex bg-gray-100 p-1 rounded-lg">
                            {['analysis', 'panel', 'management', 'interaction'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} className={`px-3 sm:px-4 py-2 rounded-md text-[10px] sm:text-xs font-bold transition uppercase ${activeTab === t ? 'bg-white shadow-sm text-indigo-600' : 'text-gray-400'}`}>
                                    {t === 'analysis' ? 'Analiz' : t === 'panel' ? 'Panel' : t === 'management' ? 'Yönetim' : 'Etkileşim'}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto bg-gray-50 p-6">
                        {activeTab === 'analysis' && (
                            <AnalysisView student={student} />
                        )}

                        {activeTab === 'panel' && (
                            <div className="max-w-md mx-auto">
                                <StudentSimulator studentId={student.uid} />
                            </div>
                        )}

                        {activeTab === 'management' && (
