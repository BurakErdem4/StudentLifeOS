        // --- CLOCK COMPONENT ---
        const DailyClocks = ({ tasks }) => {
            const radius = 20;
            const strokeWidth = 40;
            const circumference = 2 * Math.PI * radius;

            const getTaskStroke = (t, period) => {
                if (!t.startTime || !t.duration) return null;

                const [h, m] = t.startTime.split(':').map(Number);
                const startMins = h * 60 + m;
                const duration = Number(t.duration);
                const endMins = startMins + duration;

                const pStart = period === 'AM' ? 0 : 720;
                const pEnd = period === 'AM' ? 720 : 1440;

                const actualStart = Math.max(startMins, pStart);
                const actualEnd = Math.min(endMins, pEnd);

                if (actualStart >= actualEnd) return null;

                const relativeStart = actualStart - pStart;
                const relativeDuration = actualEnd - actualStart;

                const rotation = (relativeStart / 720) * 360;
                const filled = (relativeDuration / 720) * circumference;
                const gap = circumference - filled;

                // Yüzde Hesaplama (6 Renkli)
                let percent = 0;
                if (t.subItems && t.subItems.length > 0) {
                    const done = t.subItems.filter(Boolean).length;
                    percent = (done / t.subItems.length) * 100;
                } else {
                    percent = t.completed ? 100 : 0;
                }

                return {
                    dash: `${filled} ${gap}`,
                    rotate: rotation,
                    color: getProgressColor(percent)
                };
            };

            return (
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 mt-6">
                    <div className="text-center font-bold text-gray-700 mb-4 text-xs uppercase tracking-widest">Günün Ritmi</div>
                    <div className="flex justify-around items-center">
                        {['AM', 'PM'].map(period => (
                            <div key={period} className="flex flex-col items-center gap-1">
                                <div className="relative w-20 h-20">
                                    <svg className="w-full h-full -rotate-90 transform" viewBox="0 0 100 100">
                                        <circle cx="50" cy="50" r="48" fill="#e5e7eb" />
                                        <circle cx="50" cy="50" r="44" fill="white" />

                                        {tasks.map(t => {
                                            const style = getTaskStroke(t, period);
                                            if (!style) return null;
                                            return (
                                                <circle
                                                    key={`${period}-${t.id}`}
                                                    cx="50" cy="50" r="20"
                                                    fill="none"
                                                    stroke={style.color}
                                                    strokeWidth="40"
                                                    strokeDasharray={style.dash}
                                                    transform={`rotate(${style.rotate} 50 50)`}
                                                />
                                            )
                                        })}

                                        <circle cx="50" cy="50" r="2" fill="#d1d5db" />
                                    </svg>
                                    <div className="absolute top-1 left-1/2 -translate-x-1/2 text-[8px] text-gray-400 font-bold">12</div>
                                    <div className="absolute bottom-1 left-1/2 -translate-x-1/2 text-[8px] text-gray-400 font-bold">6</div>
                                    <div className="absolute left-1 top-1/2 -translate-y-1/2 text-[8px] text-gray-400 font-bold">9</div>
                                    <div className="absolute right-1 top-1/2 -translate-y-1/2 text-[8px] text-gray-400 font-bold">3</div>
                                </div>
                                <span className="text-[9px] text-gray-400 font-bold tracking-wider">{period}</span>
                            </div>
                        ))}
                    </div>
                </div>
            )
        }

        const exportToExcel = (userData, fileName = 'StudentLifeOS_Yedek') => {
            try {
                const wb = XLSX.utils.book_new();

                // Sheet 1: Profil (tüm metadata)
                const profilData = [{
                    'Ad Soyad': userData.profile?.name || '',
                    'E-posta': userData.profile?.email || '',
                    'Rol': userData.profile?.role || 'student',
                    'Sınıf ID': userData.profile?.classId || '',
                    'Altın': userData.gold || 0,
                    'Mağaza Kilitli': userData.profile?.storeLocked ? 'Evet' : 'Hayır',
                    'Eşleştirme Kodu': userData.profile?.pairingCode || '',
                    'Yedek Tarihi': new Date().toLocaleString('tr-TR')
                }];
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(profilData), 'Profil');

                // Sheet 2: Hedefler (tüm alanlar)
                const hedeflerData = (userData.projects || []).map(p => ({
                    'ID': p.id,
                    'Başlık': p.title,
                    'Toplam Birim': p.totalUnit || 0,
                    'Mevcut Birim': p.currentUnit || 0,
                    'Birim': p.unit || 'Sayfa',
                    'İlerleme %': p.totalUnit > 0 ? Math.round(((p.currentUnit || 0) / p.totalUnit) * 100) : 0,
                    'Tahmini Süre (saat)': p.totalEstTime || 0,
                    'Kalan Tahmini Saat': p.totalEstTime && p.totalUnit ? Math.round((p.totalEstTime * Math.max(0, (p.totalUnit - (p.currentUnit || 0)) / p.totalUnit)) * 10) / 10 : 0,
                    'Notlar': p.notes || '',
                    'Paket mi': p.isBundle ? 'Evet' : 'Hayır',
                    'Alt Öğeler (JSON)': p.items ? JSON.stringify(p.items) : ''
                }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(
                    hedeflerData.length > 0 ? hedeflerData : [{ 'Bilgi': 'Henüz hedef yok.' }]
                ), 'Hedefler');

                // Sheet 3: Geçmiş — Görevler (her tarih, her görev, tüm alanlar)
                const gecmisData = [];
                const history = userData.history || {};
                Object.keys(history).sort().forEach(dateKey => {
                    const day = history[dateKey];
                    (day.tasks || []).forEach(t => {
                        gecmisData.push({
                            'Tarih': dateKey,
                            'ID': t.id || '',
                            'Görev': t.title || '',
                            'Tür': t.type || 'simple',
                            'Tamamlandı': t.completed ? 'Evet' : 'Hayır',
                            'Süre (dk)': t.duration || '',
                            'Başlangıç': t.startTime || '',
                            'Proje ID': t.pid || '',
                            'Proje Başlık': t.projectTitle || '',
                            'Hedef Miktar': t.targetAmount || '',
                            'Alt Öğeler (JSON)': t.subItems ? JSON.stringify(t.subItems) : '',
                            'Atayan': t.assignedBy || '',
                            'Silinebilir': t.allowDelete === undefined ? '' : (t.allowDelete ? 'Evet' : 'Hayır')
                        });
                    });
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(
                    gecmisData.length > 0 ? gecmisData : [{ 'Bilgi': 'Henüz geçmiş yok.' }]
                ), 'Geçmiş');

                // Sheet 4: Alışkanlıklar (tanımlar)
                const habitsData = (userData.habits || []).map(h => ({
                    'ID': h.id,
                    'Başlık': h.title,
                    'Emoji': h.icon || ''
                }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(
                    habitsData.length > 0 ? habitsData : [{ 'Bilgi': 'Varsayılan alışkanlıklar kullanılıyor.' }]
                ), 'Alışkanlıklar');

                // Sheet 5: Günlük Rutin Geçmişi (hangi gün hangi alışkanlık yapıldı + günlük)
                const rutinData = [];
                Object.keys(history).sort().forEach(dateKey => {
                    const day = history[dateKey];
                    (day.habits || []).forEach(hId => {
                        rutinData.push({ 'Tarih': dateKey, 'Tür': 'Alışkanlık', 'Alışkanlık ID': hId, 'Ruh Hali': '', 'Günlük Notu': '' });
                    });
                    if (day.journal) {
                        const j = typeof day.journal === 'object' ? day.journal : { mood: '', note: day.journal };
                        rutinData.push({ 'Tarih': dateKey, 'Tür': 'Günlük', 'Alışkanlık ID': '', 'Ruh Hali': j.mood || '', 'Günlük Notu': j.note || '' });
                    }
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(
                    rutinData.length > 0 ? rutinData : [{ 'Bilgi': 'Henüz rutin verisi yok.' }]
                ), 'Rutin Geçmişi');

                // Sheet 6: Ödüller / Mağaza
                const rewardsData = (userData.rewards || []).map(r => ({
                    'ID': r.id,
                    'Başlık': r.title,
                    'Maliyet': r.cost,
                    'Emoji': r.icon || ''
                }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(
                    rewardsData.length > 0 ? rewardsData : [{ 'Bilgi': 'Varsayılan ödüller kullanılıyor.' }]
                ), 'Ödüller');

                XLSX.writeFile(wb, `${fileName}.xlsx`);
                return { success: true, message: '✅ Tam yedek başarıyla indirildi! (6 sayfa)' };
            } catch (err) {
                console.error('Excel export error:', err);
                return { success: false, message: 'Hata: Excel dosyası oluşturulamadı.' };
            }
        };

        const importFromExcel = (file) => {
            return new Promise((resolve, reject) => {
                try {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const wb = XLSX.read(data, { type: 'array' });
                            const result = {};
                            const stats = { projects: 0, days: 0, habits: 0, rewards: 0 };

                            // Parse Profil
                            if (wb.SheetNames.includes('Profil')) {
                                const rows = XLSX.utils.sheet_to_json(wb.Sheets['Profil']);
                                if (rows[0]) {
                                    result.gold = Number(rows[0]['Altın']) || 0;
                                    // profile fields are informational; we don't overwrite name/email/role
                                }
                            }

                            // Parse Hedefler
                            if (wb.SheetNames.includes('Hedefler')) {
                                const rows = XLSX.utils.sheet_to_json(wb.Sheets['Hedefler']);
                                result.projects = rows
                                    .filter(r => r['Başlık'])
                                    .map(r => {
                                        const proj = {
                                            id: r['ID'] || Date.now() + Math.random(),
                                            title: r['Başlık'],
                                            totalUnit: Number(r['Toplam Birim']) || 0,
                                            currentUnit: Number(r['Mevcut Birim']) || 0,
                                            unit: r['Birim'] || 'Sayfa',
                                            totalEstTime: Number(r['Tahmini Süre (saat)']) || 0,
                                            notes: r['Notlar'] || ''
                                        };
                                        if (r['Paket mi'] === 'Evet') proj.isBundle = true;
                                        if (r['Alt Öğeler (JSON)']) {
                                            try { proj.items = JSON.parse(r['Alt Öğeler (JSON)']); } catch (e) { }
                                        }
                                        return proj;
                                    });
                                stats.projects = result.projects.length;
                            }

                            // Parse Geçmiş
                            if (wb.SheetNames.includes('Geçmiş')) {
                                const rows = XLSX.utils.sheet_to_json(wb.Sheets['Geçmiş']);
                                const historyObj = {};
                                rows.forEach(r => {
                                    if (!r['Tarih'] || !r['Görev']) return;
                                    const key = String(r['Tarih']);
                                    if (!historyObj[key]) historyObj[key] = { tasks: [], habits: [], journal: null };
                                    const task = {
                                        id: r['ID'] || Date.now() + Math.random(),
                                        title: r['Görev'],
                                        type: r['Tür'] || 'simple',
                                        completed: r['Tamamlandı'] === 'Evet',
                                        duration: String(r['Süre (dk)'] || '30'),
                                        startTime: r['Başlangıç'] || ''
                                    };
                                    if (r['Proje ID']) task.pid = r['Proje ID'];
                                    if (r['Proje Başlık']) task.projectTitle = r['Proje Başlık'];
                                    if (r['Hedef Miktar']) task.targetAmount = Number(r['Hedef Miktar']);
                                    if (r['Alt Öğeler (JSON)']) {
                                        try { task.subItems = JSON.parse(r['Alt Öğeler (JSON)']); } catch (e) { }
                                    }
                                    if (r['Atayan']) task.assignedBy = r['Atayan'];
                                    if (r['Silinebilir'] === 'Evet') task.allowDelete = true;
                                    if (r['Silinebilir'] === 'Hayır') task.allowDelete = false;
                                    historyObj[key].tasks.push(task);
                                });
                                result.history = historyObj;
                                stats.days = Object.keys(historyObj).length;
                            }

                            // Parse Rutin Geçmişi (merge into history)
                            if (wb.SheetNames.includes('Rutin Geçmişi')) {
                                const rows = XLSX.utils.sheet_to_json(wb.Sheets['Rutin Geçmişi']);
                                if (!result.history) result.history = {};
                                rows.forEach(r => {
                                    if (!r['Tarih']) return;
                                    const key = String(r['Tarih']);
                                    if (!result.history[key]) result.history[key] = { tasks: [], habits: [], journal: null };
                                    if (r['Tür'] === 'Alışkanlık' && r['Alışkanlık ID']) {
                                        result.history[key].habits.push(r['Alışkanlık ID']);
                                    }
                                    if (r['Tür'] === 'Günlük') {
                                        result.history[key].journal = { mood: r['Ruh Hali'] || '', note: r['Günlük Notu'] || r['Günlük'] || '' };
                                    }
                                });
                            }

                            // Parse Alışkanlıklar
                            if (wb.SheetNames.includes('Alışkanlıklar')) {
                                const rows = XLSX.utils.sheet_to_json(wb.Sheets['Alışkanlıklar']);
                                const habits = rows.filter(r => r['Başlık']).map(r => ({
                                    id: r['ID'] || 'h_' + Date.now() + Math.random(),
                                    title: r['Başlık'],
                                    icon: r['Emoji'] || '✨'
                                }));
                                if (habits.length > 0) {
                                    result.habits = habits;
                                    stats.habits = habits.length;
                                }
                            }

                            // Parse Ödüller
                            if (wb.SheetNames.includes('Ödüller')) {
                                const rows = XLSX.utils.sheet_to_json(wb.Sheets['Ödüller']);
                                const rewards = rows.filter(r => r['Başlık']).map(r => ({
                                    id: r['ID'] || Date.now() + Math.random(),
                                    title: r['Başlık'],
                                    cost: Number(r['Maliyet']) || 0,
                                    icon: r['Emoji'] || '🎁'
                                }));
                                if (rewards.length > 0) {
                                    result.rewards = rewards;
                                    stats.rewards = rewards.length;
                                }
                            }

                            resolve({ data: result, stats, success: true });
                        } catch (parseErr) {
                            console.error('Import parse error:', parseErr);
                            reject({ success: false, message: 'Hata: Geçersiz dosya formatı. Lütfen uygun bir Excel dosyası seçin.' });
                        }
                    };
                    reader.onerror = () => reject({ success: false, message: 'Hata: Dosya okunamadı.' });
                    reader.readAsArrayBuffer(file);
                } catch (err) {
                    reject({ success: false, message: 'Hata: Dosya işlenemedi.' });
                }
            });
        };

                const tumGecmis = [];
                students.forEach(s => {

                    Object.keys(history).sort().forEach(dateKey => {
                        const day = history[dateKey];
                        (day.tasks || []).forEach(t => {
                            tumGecmis.push({
                                'UID': s.uid || '',
                                'Öğrenci': s.profile?.name || '',
                                'Tarih': dateKey,
                                'ID': t.id || '',
                                'Görev': t.title || '',
                                'Tür': t.type || 'simple',
                                'Tamamlandı': t.completed ? 'Evet' : 'Hayır',
                                'Süre (dk)': t.duration || '',
                                'Başlangıç': t.startTime || '',
                                'Proje ID': t.pid || '',
                                'Proje Başlık': t.projectTitle || '',
                                'Hedef Miktar': t.targetAmount || '',
                                'Alt Öğeler (JSON)': t.subItems ? JSON.stringify(t.subItems) : '',
                                'Atayan': t.assignedBy || '',
                                'Silinebilir': t.allowDelete === undefined ? '' : (t.allowDelete ? 'Evet' : 'Hayır')
                            });
                        });
                    });
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(
                    tumGecmis.length > 0 ? tumGecmis : [{ 'Bilgi': 'Henüz geçmiş verisi yok.' }]
                ), 'Tüm Geçmiş');

                // Sheet 4: Tüm Rutin Geçmişi
                const tumRutin = [];
                students.forEach(s => {
                    const history = s.history || {};
                    Object.keys(history).sort().forEach(dateKey => {
                        const day = history[dateKey];
                        (day.habits || []).forEach(hId => {
                            tumRutin.push({ 'UID': s.uid || '', 'Öğrenci': s.profile?.name || '', 'Tarih': dateKey, 'Tür': 'Alışkanlık', 'Alışkanlık ID': hId, 'Ruh Hali': '', 'Günlük Notu': '' });
                        });
                        if (day.journal) {
                            const j = typeof day.journal === 'object' ? day.journal : { mood: '', note: day.journal };
                            tumRutin.push({ 'UID': s.uid || '', 'Öğrenci': s.profile?.name || '', 'Tarih': dateKey, 'Tür': 'Günlük', 'Alışkanlık ID': '', 'Ruh Hali': j.mood || '', 'Günlük Notu': j.note || '' });
                        }
                    });
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(
                    tumRutin.length > 0 ? tumRutin : [{ 'Bilgi': 'Henüz rutin verisi yok.' }]
                ), 'Tüm Rutinler');

                XLSX.writeFile(wb, `${fileName}.xlsx`);
                return { success: true, message: `✅ ${students.length} öğrencinin TAM verisi dışa aktarıldı! (${tumHedefler.length} hedef, ${tumGecmis.length} görev kaydı)` };

        };
        // --- ERROR BOUNDARY ---
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null, errorInfo: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true };
            }

            componentDidCatch(error, errorInfo) {
                this.setState({ error, errorInfo });
                console.error("Uncaught error:", error, errorInfo);
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-4 bg-red-50 text-red-900 h-screen overflow-auto font-mono text-sm">
                            <h1 className="text-2xl font-bold mb-4">Uygulama Hatası (Crash)</h1>
                            <p className="mb-2">Bir hata oluştu ve uygulama durduruldu.</p>
                            <div className="bg-red-100 p-4 rounded mb-4 overflow-auto border border-red-200">
                                <strong className="block mb-2">Hata Mesajı:</strong>
                                {this.state.error && this.state.error.toString()}
                            </div>
                            <div className="bg-gray-100 p-4 rounded overflow-auto border border-gray-200 h-96">
                                <strong className="block mb-2">Stack Trace:</strong>
                                {this.state.errorInfo && this.state.errorInfo.componentStack}
                            </div>
                            <button onClick={() => window.location.reload()} className="mt-4 px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">
                                Sayfayı Yenile
                            </button>
                        </div>
                    );
                }

                return this.props.children;
            }
        }

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [loadingUser, setLoadingUser] = useState(true);
            const [activeTab, setActiveTab] = useState('planner');
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [projects, setProjects] = useState([]);
            const [history, setHistory] = useState({});
            const [habits, setHabits] = useState([]);
            const [rewards, setRewards] = useState([]);
            const [gold, setGold] = useState(0);
            const [flippedCards, setFlippedCards] = useState({});
            const [flippedProjects, setFlippedProjects] = useState({});
            const [focusMode, setFocusMode] = useState({ active: false, taskId: null, taskTitle: '', timeLeft: 0, isRunning: false });
            const [modal, setModal] = useState({ open: false, type: null, data: null });
            const [form, setForm] = useState({});
            const [notificationModal, setNotificationModal] = useState(null);
            const [dataAccordionOpen, setDataAccordionOpen] = useState(false);



            useEffect(() => {
                let profileUnsub = null;
                const unsubscribe = auth.onAuthStateChanged((currentUser) => {
                    if (currentUser) {
                        setUser(currentUser);
                        // on() ile dinle → profil sonradan yazılsa bile yakalar
                        const profileRef = db.ref(`users/${currentUser.uid}/profile`);
                        profileUnsub = profileRef.on('value', (snap) => {
                            setProfile(snap.val());
                            setLoadingUser(false);
                        });
                    } else {
                        setUser(null);
                        setProfile(null);
                        setLoadingUser(false);
                    }
                });
                return () => {
                    unsubscribe();
                    if (profileUnsub && user) {
                        db.ref(`users/${user.uid}/profile`).off('value', profileUnsub);
                    }
                };
            }, []);

            useEffect(() => {
                if (!user) return;
                const notifRef = db.ref(`users/${user.uid}/notifications`);
                const mountTime = Date.now();
                let initialLoad = true;

                // First, clear any old notifications
                notifRef.once('value', (snapshot) => {
                    const existing = snapshot.val();
                    if (existing) {
                        // Remove old notifications silently
                        Object.keys(existing).forEach(key => {
                            db.ref(`users/${user.uid}/notifications/${key}`).remove();
                        });
                    }
                    initialLoad = false;
                });

                // Then listen for truly new ones
                notifRef.on('child_added', (snapshot) => {
                    if (initialLoad) return; // Skip notifications that existed before mount
                    const val = snapshot.val();
                    if (val) {
                        setNotificationModal({ id: snapshot.key, ...val });
                        if (val.type === 'celebrate' || val.gold > 0) {
                            if (window.confetti) window.confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                        }
                    }
                });
                return () => notifRef.off();
            }, [user]);

            const closeNotification = () => {
                if (notificationModal) {
                    db.ref(`users/${user.uid}/notifications/${notificationModal.id}`).remove();
                    setNotificationModal(null);
                }
            };

            useEffect(() => {
                if (!user) return;
                const userRef = db.ref('users/' + user.uid);
                userRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        setProjects(data.projects || []);
                        setHistory(data.history || {});
                        setHabits(data.habits || DEFAULT_HABITS);
                        setRewards(data.rewards || DEFAULT_REWARDS);
                        setGold(data.gold || 0);
                    }
                });
                return () => userRef.off();
            }, [user]);

            const getDateKey = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };

            const dateKey = getDateKey(selectedDate);
            const todayKey = getDateKey(new Date());
            const getDayData = (key) => history[key] || { tasks: [], habits: [], journal: null };
            const currentDayData = getDayData(dateKey);

            useEffect(() => {
                let interval = null;
                if (focusMode.active && focusMode.isRunning && focusMode.timeLeft > 0) {
                    interval = setInterval(() => setFocusMode(p => ({ ...p, timeLeft: p.timeLeft - 1 })), 1000);
                } else if (focusMode.timeLeft === 0 && focusMode.isRunning) {
                    setFocusMode(p => ({ ...p, isRunning: false }));
                }
                return () => clearInterval(interval);
            }, [focusMode]);

            const updateCloud = (path, value) => { if (!user) return; db.ref(`users/${user.uid}/${path}`).set(value); };
            const updateGold = (amount) => {
                const newGold = Math.max(0, gold + amount);
                updateCloud('gold', newGold);
            };

            const handleAddTask = (type) => {
                let newTask;
                if (type === 'simple') {
                    newTask = { id: Date.now(), title: form.title, type: 'simple', completed: false, duration: form.time || '30', startTime: form.startTime || '' };
                } else if (type === 'import') {
                    const p = modal.data || projects.find(pro => pro.id === Number(form.projectId));
                    if (!p) return alert("Lütfen bir proje seçin!");
                    const amount = Number(form.amount) || 1;
                    let calculatedDuration = form.time;
                    if (!calculatedDuration && p.totalEstTime && p.totalUnit) {
                        const timePerUnitHours = p.totalEstTime / p.totalUnit;
                        const totalHours = timePerUnitHours * amount;
                        calculatedDuration = Math.round(totalHours * 60);
                    }
                    if (!calculatedDuration) calculatedDuration = '60';
                    newTask = {
                        id: Date.now(), title: `${p.title} (${amount} ${p.unit})`, type: 'project_slice',
                        pid: p.id, targetAmount: amount, subItems: new Array(amount).fill(false), completed: false,
                        duration: String(calculatedDuration), startTime: form.startTime || ''
                    };
                }
                const newTasks = [...(currentDayData.tasks || []), newTask];
                updateCloud(`history/${dateKey}/tasks`, newTasks);
                closeModal();
            };

            const toggleTask = (taskId) => {
                const task = currentDayData.tasks.find(t => t.id === taskId);
                const newStatus = !task.completed;
                updateGold(newStatus ? 10 : -10);
                const updatedTasks = currentDayData.tasks.map(t => t.id === taskId ? { ...t, completed: newStatus } : t);
                updateCloud(`history/${dateKey}/tasks`, updatedTasks);
            };

            const toggleSubItem = (taskId, index) => {
                const task = currentDayData.tasks.find(t => t.id === taskId);
                const newSubItems = [...task.subItems];
                const wasDone = newSubItems[index];
                newSubItems[index] = !wasDone;

                if (task.type === 'project_slice') {
                    const targetProject = projects.find(p => p.id === task.pid);
                    if (targetProject) {
                        const newCurrent = Math.min(targetProject.totalUnit, Math.max(0, targetProject.currentUnit + (wasDone ? -1 : 1)));
                        const updatedProjects = projects.map(p => p.id === task.pid ? { ...p, currentUnit: newCurrent } : p);
                        updateCloud('projects', updatedProjects);
                    }
                }
                const allDone = newSubItems.every(i => i === true);
                updateGold(wasDone ? -5 : 5);
                const updatedTasks = currentDayData.tasks.map(t => {
                    if (t.id === taskId) return { ...t, subItems: newSubItems, completed: allDone };
                    return t;
                });
                updateCloud(`history/${dateKey}/tasks`, updatedTasks);
            };

            const toggleHabit = (habitId) => {
                const doneHabits = currentDayData.habits || [];
                const isDone = doneHabits.includes(habitId);
                let newHabits = isDone ? doneHabits.filter(id => id !== habitId) : [...doneHabits, habitId];
                updateGold(isDone ? -5 : 5);
                updateCloud(`history/${dateKey}/habits`, newHabits);
            };

            const deleteTask = (id) => {
                const task = currentDayData.tasks.find(t => t.id === id);
                if (task?.isMentorTask && task?.allowDelete === false) {
                    alert("Bu görev kilitli! Mentor onayı olmadan silemezsin.");
                    return;
                }
                updateCloud(`history/${dateKey}/tasks`, currentDayData.tasks.filter(t => t.id !== id));
            };
            const deleteHabit = (id) => updateCloud('habits', habits.filter(h => h.id !== id));
            const addHabit = () => { if (form.title) { updateCloud('habits', [...habits, { id: Date.now(), title: form.title, icon: form.icon || '✨' }]); setForm({ title: '', icon: '' }); } };

            const handleAddProject = () => {
                if (form.title) {
                    const initial = Number(form.initial) || 0;
                    updateCloud('projects', [...projects, {
                        id: Date.now(),
                        title: form.title,
                        totalUnit: Number(form.total) || 100,
                        currentUnit: initial, // Start with initial unit
                        initialUnit: initial, // Store initial unit for analytics
                        unit: form.unit || 'br',
                        totalEstTime: Number(form.estTime) || 0
                    }]);
                    closeModal();
                }
            };
            const handleEditProject = () => {
                const p = modal.data;
                const newTotal = Number(form.total) || 100;
                const newCurrent = Number(form.current) || 0;
                const newTitle = form.title || p.title;
                const newUnit = form.unit || 'br';
                const newEstTime = Number(form.estTime) || 0;

                // LOGIC: Calculate new initialUnit based on newCurrent and historical progress
                // 1. Calculate how much progress was made via tasks (history)
                // We don't have direct access to 'progressFromTasks' here easily without iterating ALL history.
                // Alternative: We can persist 'initialUnit'. 
                // FORMULA: currentUnit = initialUnit + progressFromTasks
                // THEREFORE: progressFromTasks = oldCurrent - oldInitial

                const oldInitial = Number(p.initialUnit) || 0;
                const oldCurrent = Number(p.currentUnit) || 0;
                const progressFromTasks = Math.max(0, oldCurrent - oldInitial);

                // 2. New Initial Unit = newCurrent - progressFromTasks
                let newInitial = newCurrent - progressFromTasks;

                // Edge case: If user reduces current below what was done in tasks, newInitial might be negative. 
                // Or if they want to reset 'initial' explicitly?
                // The prompt says: "User enters new current... system calculates new initial".
                // This implies 'progressFromTasks' is the constant truth we want to preserve.

                // Let's trust the calc. If negative, it means tasks alone account for more than the new current? 
                // That implies data inconsistency (tasks say 50 done, but user sets current to 40).
                // In that case, we might need to adjust. But for now, let's allow it or clamp to 0?
                // If initial is negative, it means we "owe" progress? Probably 0 is safe floor, but that desyncs total.
                // Let's keep it simple: strict math.

                // Wait, if I change 'initialUnit', I might affect analytics for 'Cumulative'.
                // Yes, that's the point.

                const updatedProjects = projects.map(proj => proj.id === p.id ? {
                    ...proj,
                    title: newTitle,
                    totalUnit: newTotal,
                    unit: newUnit,
                    totalEstTime: newEstTime,
                    currentUnit: newCurrent,
                    initialUnit: newInitial
                } : proj);

                updateCloud('projects', updatedProjects);
                closeModal();
            };
            const handleBuyReward = (r) => { if (gold >= r.cost && confirm('Satın almak istiyor musun?')) updateGold(-r.cost); };
            const handleAddReward = () => { if (form.title) { updateCloud('rewards', [...rewards, { id: Date.now(), title: form.title, cost: Number(form.cost), icon: form.icon || '🎁' }]); closeModal(); } };
            const handleDeleteReward = (id) => { if (confirm('Silmek istediğine emin misin?')) updateCloud('rewards', rewards.filter(r => r.id !== id)); };
            const closeModal = () => setModal({ open: false, type: null, data: null });
            const openModal = (type, data = null) => { setModal({ open: true, type, data }); setForm({}); if (type === 'journal') { setForm({ mood: currentDayData.journal?.mood || '😐', note: currentDayData.journal?.note || '' }); } };

            if (loadingUser) return <div className="h-full flex items-center justify-center bg-gray-900 text-white">Yükleniyor...</div>;
            if (!user) return <AuthScreen />;

            if (profile && profile.role === 'mentor') {
                return (
                    <MentorDashboard
                        currentUser={user}
                    />
                );
            }

            if (profile && profile.role === 'parent') {
                return (
                    <ParentDashboard
                        currentUser={user}
                    />
                );
            }

            return (
                <StudentUI
                    user={user} profile={profile || {}} activeTab={activeTab} setActiveTab={setActiveTab}
                    selectedDate={selectedDate} setSelectedDate={setSelectedDate}
                    projects={projects} history={history} habits={habits} rewards={rewards}
                    gold={gold} flippedCards={flippedCards} setFlippedCards={setFlippedCards}
                    flippedProjects={flippedProjects} setFlippedProjects={setFlippedProjects}
                    focusMode={focusMode} setFocusMode={setFocusMode}
                    modal={modal}
                    openModal={(type, data) => { setModal({ open: true, type, data }); setForm({}); if (type === 'journal') { setForm({ mood: currentDayData.journal?.mood || '😐', note: currentDayData.journal?.note || '' }); } }}
                    closeModal={() => setModal({ open: false, type: null, data: null })}
                    form={form} setForm={setForm}
                    notificationModal={notificationModal} closeNotification={closeNotification}
                    handleAddProject={handleAddProject}
                    handleEditProject={handleEditProject}
                    handleDeleteProject={(id) => { updateCloud('projects', projects.filter(p => p.id !== id)); }}
                    handleAddTask={handleAddTask}
                    toggleTask={toggleTask}
                    toggleSubItem={toggleSubItem}
                    deleteTask={deleteTask}
                    addHabit={addHabit}
                    deleteHabit={deleteHabit}
                    toggleHabit={toggleHabit}
                    handlePurchase={handleBuyReward}
                    handleAddReward={handleAddReward}
                    handleDeleteReward={handleDeleteReward}
                    handleStartFocus={(t) => setFocusMode({ active: true, taskId: t.id, taskTitle: t.title, timeLeft: Number(t.duration) * 60, isRunning: true })}
                    handleStopFocus={() => setFocusMode({ ...focusMode, active: false })}
                    dateKey={dateKey}
                    todayKey={todayKey}
                    currentDayData={currentDayData}
                    updateCloud={updateCloud}
                />
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>

</html>
