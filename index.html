                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[70] flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl max-w-sm w-full p-6 text-center transform transition-all">
                                <div className="text-5xl mb-4">
                                    {notificationModal.type === 'celebrate' ? '🎉' : '💪'}
                                </div>
                                <h3 className="text-xl font-bold text-gray-900 dark:text-slate-100 mb-2">{notificationModal.title}</h3>
                                <p className="text-gray-600 mb-4 leading-relaxed">{notificationModal.message}</p>
                                {notificationModal.gold > 0 && (
                                    <div className="inline-flex items-center gap-2 bg-amber-50 text-amber-700 px-4 py-2 rounded-full font-bold text-sm mb-4 border border-amber-200">
                                        🪙 +{notificationModal.gold} Altın Kazanıldı!
                                    </div>
                                )}
                                <button
                                    onClick={closeNotification}
                                    className="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-bold transition shadow-lg shadow-indigo-200 mt-2"
                                >
                                    Harika! ✨
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        // --- ERROR BOUNDARY ---
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null, errorInfo: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true };
            }

            componentDidCatch(error, errorInfo) {
                this.setState({ error, errorInfo });
                console.error("Uncaught error:", error, errorInfo);
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-4 bg-red-50 text-red-900 h-screen overflow-auto font-mono text-sm">
                            <h1 className="text-2xl font-bold mb-4">Uygulama Hatası (Crash)</h1>
                            <p className="mb-2">Bir hata oluştu ve uygulama durduruldu.</p>
                            <div className="bg-red-100 p-4 rounded mb-4 overflow-auto border border-red-200">
                                <strong className="block mb-2">Hata Mesajı:</strong>
                                {this.state.error && this.state.error.toString()}
                            </div>
                            <div className="bg-gray-100 p-4 rounded overflow-auto border border-gray-200 dark:border-slate-700 h-96">
                                <strong className="block mb-2">Stack Trace:</strong>
                                {this.state.errorInfo && this.state.errorInfo.componentStack}
                            </div>
                            <button onClick={() => window.location.reload()} className="mt-4 px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">
                                Sayfayı Yenile
                            </button>
                        </div>
                    );
                }

                return this.props.children;
            }
        }

        // --- ADMIN PANEL (GOD MODE) ---
        // Moved to ./components/AdminPanel.jsx

        // --- MAINTENANCE MODE SCREEN ---
        function MaintenanceScreen() {
            return (
                <div className="h-full flex items-center justify-center p-8" style={{ background: 'linear-gradient(180deg, #0a0a0a 0%, #111 100%)' }}>
                    <div className="text-center max-w-md">
                        <div className="text-7xl mb-6 animate-pulse">🛠️</div>
                        <h1 className="text-2xl font-extrabold mb-3" style={{ color: '#e5e5e5' }}>Bakım Modu Aktif</h1>
                        <p className="text-sm leading-relaxed mb-6" style={{ color: '#555' }}>
                            Uygulama şu an bakımdadır. Sistem güncellemeleri yapılıyor, lütfen daha sonra tekrar deneyin.
                        </p>
                        <div className="inline-flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-bold" style={{ background: '#1a1a1a', color: '#444', border: '1px solid #222' }}>
                            <span className="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                            Tahmini süre: Kısa süre içinde
                        </div>
                    </div>
                </div>
            );
        }

        // --- SUSPENDED SCREEN ---
        function SuspendedScreen() {
            return (
                <div className="h-full flex items-center justify-center p-8" style={{ background: 'linear-gradient(180deg, #0a0a0a 0%, #111 100%)' }}>
                    <div className="text-center max-w-md">
                        <div className="text-7xl mb-6">⏸️</div>
                        <h1 className="text-2xl font-extrabold mb-3" style={{ color: '#e5e5e5' }}>Hesabınız Askıya Alındı</h1>
                        <p className="text-sm leading-relaxed mb-6" style={{ color: '#555' }}>
                            Hesabınız geçici olarak askıya alınmıştır. Lütfen yöneticinizle iletişime geçin.
                        </p>
                        <div className="inline-flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-bold" style={{ background: '#1a1a1a', color: '#444', border: '1px solid #222' }}>
                            <span className="w-2 h-2 rounded-full bg-red-500"></span>
                            Erişim engellendi
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [loadingUser, setLoadingUser] = useState(true);
            const [userRole, setUserRole] = React.useState('student');
            const [isMaintenanceMode, setIsMaintenanceMode] = React.useState(false);
            const [isAdminImpersonating, setIsAdminImpersonating] = React.useState(false);
            const [realAdminUser, setRealAdminUser] = React.useState(null);
            const [activeTab, setActiveTab] = useState('planner');
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [projects, setProjects] = useState([]);
            const [history, setHistory] = useState({});
            const [habits, setHabits] = useState([]);
            const [rewards, setRewards] = useState([]);
            const [gold, setGold] = useState(0);
            const [streakFreeze, setStreakFreeze] = useState(0);
            const [flippedCards, setFlippedCards] = useState({});
            const [flippedProjects, setFlippedProjects] = useState({});
            const [focusMode, setFocusMode] = useState({ active: false, taskId: null, taskTitle: '', timeLeft: 0, isRunning: false });
            const [modal, setModal] = useState({ open: false, type: null, data: null });
            const [form, setForm] = useState({});
            const [notificationModal, setNotificationModal] = useState(null);
            const [dataAccordionOpen, setDataAccordionOpen] = useState(false);


            // Global maintenance mode listener (Firebase → tüm istemcilerde gerçek zamanlı)
            useEffect(() => {
                const maintenanceRef = db.ref('system/maintenanceMode');
                maintenanceRef.on('value', (snap) => {
                    setIsMaintenanceMode(snap.val() === true);
                });
                return () => maintenanceRef.off();
            }, []);

            // Force Logout: Silinen veya dondurulan kullanıcıyı anında at
            useEffect(() => {
                if (!user || userRole === 'admin' || isAdminImpersonating) return;
                const userRef = db.ref('users/' + user.uid);
                const onValue = userRef.on('value', (snap) => {
                    const data = snap.val();
                    if (data === null || data?.profile?.isSuspended === true) {
                        userRef.off('value', onValue);
                        auth.signOut().then(() => {
                            localStorage.clear();
                            window.location.reload();
                        });
                    }
                });
                return () => userRef.off('value', onValue);
            }, [user, userRole, isAdminImpersonating]);

            useEffect(() => {
                let profileUnsub = null;
                const unsubscribe = auth.onAuthStateChanged((currentUser) => {
                    if (currentUser) {
                        setUser(currentUser);
                        // Write lastSeen on every login (non-admin)
                        db.ref(`users/${currentUser.uid}/profile/lastSeen`).set(Date.now());
                        // on() ile dinle → profil sonradan yazılsa bile yakalar
                        const profileRef = db.ref(`users/${currentUser.uid}/profile`);
                        profileUnsub = profileRef.on('value', (snap) => {
                            const profileData = snap.val();
                            setProfile(profileData);
                            // Admin detection from DB role
                            if (profileData && profileData.role === 'admin') {
                                setUserRole('admin');
                            } else {
                                setUserRole('student');
                            }
                            setLoadingUser(false);
                        });
                    } else {
                        setUser(null);
                        setProfile(null);
                        setUserRole('student');
                        setLoadingUser(false);
                    }
                });
                return () => {
                    unsubscribe();
                    if (profileUnsub && user) {
                        db.ref(`users/${user.uid}/profile`).off('value', profileUnsub);
                    }
                };
            }, []);

            useEffect(() => {
                if (!user) return;
                const notifRef = db.ref(`users/${user.uid}/notifications`);
                const mountTime = Date.now();
                let initialLoad = true;

                // First, clear any old notifications
                notifRef.once('value', (snapshot) => {
                    const existing = snapshot.val();
                    if (existing) {
                        // Remove old notifications silently
                        Object.keys(existing).forEach(key => {
                            db.ref(`users/${user.uid}/notifications/${key}`).remove();
                        });
                    }
                    initialLoad = false;
                });

                // Then listen for truly new ones
                notifRef.on('child_added', (snapshot) => {
                    if (initialLoad) return; // Skip notifications that existed before mount
                    const val = snapshot.val();
                    if (val) {
                        setNotificationModal({ id: snapshot.key, ...val });
                        if (val.type === 'celebrate' || val.gold > 0) {
                            if (window.confetti) window.confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                        }
                    }
                });
                return () => notifRef.off();
            }, [user]);

            const closeNotification = () => {
                if (notificationModal) {
                    // Save to persistent profile messages before deleting
                    const currentMessages = profile?.mentorMessages || [];
                    const newMessage = {
                        id: notificationModal.id,
                        title: notificationModal.title || 'Mesaj',
                        message: notificationModal.message || '',
                        gold: notificationModal.gold || 0,
                        timestamp: notificationModal.timestamp || Date.now(),
                        type: notificationModal.type || 'message'
                    };
                    const updatedMessages = [newMessage, ...currentMessages].slice(0, 50); // Keep last 50
                    updateCloud('profile/mentorMessages', updatedMessages);

                    // Remove from temporary notifications
                    db.ref(`users/${user.uid}/notifications/${notificationModal.id}`).remove();
                    setNotificationModal(null);
                }
            };

            useEffect(() => {
                if (!user) return;
                const userRef = db.ref('users/' + user.uid);
                userRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        setProjects(data.projects || []);
                        setHistory(data.history || {});
                        setHabits(data.habits || DEFAULT_HABITS);
                        setRewards(data.rewards || DEFAULT_REWARDS);
                        setGold(data.gold || 0);
                        setStreakFreeze(data.streakFreeze || 0);
                    }
                });
                return () => userRef.off();
            }, [user]);

            // Streak Freeze auto-consume
            useEffect(() => {
                if (!user || !history || Object.keys(history).length === 0 || streakFreeze <= 0) return;
                const gdk = (d) => {
                    const y = d.getFullYear();
                    const m = String(d.getMonth() + 1).padStart(2, '0');
                    const dd = String(d.getDate()).padStart(2, '0');
                    return `${y}-${m}-${dd}`;
                };
                const isDayFailed = (dayData) => {
                    if (!dayData) return true;
                    if (dayData.frozen === true) return false;
                    const tasks = dayData.tasks || [];
                    const hasTask = tasks.some(t => t.completed || (t.subItems && t.subItems.some(Boolean)));
                    const hasHabit = (dayData.habits || []).length > 0;
                    return !(hasTask && hasHabit);
                };
                let freezesLeft = streakFreeze;
                for (let i = 1; i <= 3 && freezesLeft > 0; i++) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const key = gdk(d);
                    const dayData = history[key];
                    if (isDayFailed(dayData)) {
                        updateCloud(`history/${key}/frozen`, true);
                        freezesLeft--;
                        updateCloud('streakFreeze', freezesLeft);
                    }
                }
            }, [user, history, streakFreeze]);

            const getDateKey = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };

            const dateKey = getDateKey(selectedDate);
            const todayKey = getDateKey(new Date());
            const getDayData = (key) => history[key] || { tasks: [], habits: [], journal: null };
            const currentDayData = getDayData(dateKey);

            useEffect(() => {
                let interval = null;
                if (focusMode.active && focusMode.isRunning && focusMode.timeLeft > 0) {
                    interval = setInterval(() => setFocusMode(p => ({ ...p, timeLeft: p.timeLeft - 1 })), 1000);
                } else if (focusMode.timeLeft === 0 && focusMode.isRunning) {
                    setFocusMode(p => ({ ...p, isRunning: false }));
                }
                return () => clearInterval(interval);
            }, [focusMode]);

            const updateCloud = (path, value) => { if (!user) return; db.ref(`users/${user.uid}/${path}`).set(value); };
            const updateGold = (amount) => {
                const newGold = Math.max(0, gold + amount);
                updateCloud('gold', newGold);
            };

            const handleAddTask = (type) => {
                let newTask;
                if (type === 'simple') {
                    newTask = { id: Date.now(), title: form.title, type: 'simple', completed: false, duration: form.time || '30', startTime: form.startTime || '' };
                } else if (type === 'import') {
                    const p = modal.data || projects.find(pro => String(pro.id).replace("ID_", "") === String(form.projectId).replace("ID_", ""));
                    if (!p) return alert("Lütfen bir proje seçin!");
                    const amount = Number(form.amount) || 1;
                    let calculatedDuration = form.time;
                    if (!calculatedDuration && p.totalEstTime && p.totalUnit) {
                        const timePerUnitHours = p.totalEstTime / p.totalUnit;
                        const totalHours = timePerUnitHours * amount;
                        calculatedDuration = Math.round(totalHours * 60);
                    }
                    if (!calculatedDuration) calculatedDuration = '60';
                    newTask = {
                        id: Date.now(), title: `${p.title} (${amount} ${p.unit})`, type: 'project_slice',
                        pid: p.id, targetAmount: amount, subItems: new Array(amount).fill(false), completed: false,
                        duration: String(calculatedDuration), startTime: form.startTime || ''
                    };
                }
                const newTasks = [...(currentDayData.tasks || []), newTask];
                updateCloud(`history/${dateKey}/tasks`, newTasks);
                closeModal();
            };

            const toggleTask = (taskId) => {
                const task = currentDayData.tasks.find(t => t.id === taskId);
                const newStatus = !task.completed;
                updateGold(newStatus ? 10 : -10);
                const updatedTasks = currentDayData.tasks.map(t => t.id === taskId ? { ...t, completed: newStatus } : t);
                updateCloud(`history/${dateKey}/tasks`, updatedTasks);
            };

            const toggleSubItem = (taskId, index) => {
                const task = currentDayData.tasks.find(t => t.id === taskId);
                const newSubItems = [...task.subItems];
                const wasDone = newSubItems[index];
                newSubItems[index] = !wasDone;

                if (task.type === 'project_slice') {
                    const targetProject = projects.find(p => String(p.id) === String(task.pid));
                    if (targetProject) {
                        const newCurrent = Math.max(0, targetProject.currentUnit + (wasDone ? -1 : 1));
                        const updatedProjects = projects.map(p => String(p.id) === String(task.pid) ? { ...p, currentUnit: newCurrent } : p);
                        updateCloud('projects', updatedProjects);
                    }
                }
                const allDone = newSubItems.every(i => i === true);
                updateGold(wasDone ? -5 : 5);
                const updatedTasks = currentDayData.tasks.map(t => {
                    if (t.id === taskId) return { ...t, subItems: newSubItems, completed: allDone };
                    return t;
                });
                updateCloud(`history/${dateKey}/tasks`, updatedTasks);
            };

            const toggleHabit = (habitId) => {
                const doneHabits = currentDayData.habits || [];
                const isDone = doneHabits.includes(habitId);
                let newHabits = isDone ? doneHabits.filter(id => id !== habitId) : [...doneHabits, habitId];
                updateGold(isDone ? -5 : 5);
                updateCloud(`history/${dateKey}/habits`, newHabits);
            };

            const deleteTask = (id) => {
                const task = currentDayData.tasks.find(t => t.id === id);
                if (task?.isMentorTask && task?.allowDelete === false) {
                    alert("Bu görev kilitli! Mentor onayı olmadan silemezsin.");
                    return;
                }
                updateCloud(`history/${dateKey}/tasks`, currentDayData.tasks.filter(t => t.id !== id));
            };
            const deleteHabit = (id) => updateCloud('habits', habits.filter(h => h.id !== id));
            const addHabit = () => { if (form.title) { updateCloud('habits', [...habits, { id: Date.now(), title: form.title, icon: form.icon || '✨' }]); setForm({ title: '', icon: '' }); } };

            const handleAddProject = () => {
                if (form.title) {
                    const initial = Number(form.initial) || 0;
                    updateCloud('projects', [...projects, {
                        id: Date.now(),
                        title: form.title,
                        category: form.category || '',
                        totalUnit: Number(form.total) || 100,
                        currentUnit: initial, // Start with initial unit
                        initialUnit: initial, // Store initial unit for analytics
                        unit: form.unit || 'br',
                        totalEstTime: Number(form.estTime) || 0
                    }]);
                    closeModal();
                }
            };
            const handleEditProject = () => {
                const p = modal.data;
                if (!p) return;
                const newTitle = form.title !== undefined ? form.title : p.title;
                const newTotal = form.total !== undefined && form.total !== '' ? Number(form.total) : Number(p.totalUnit) || 100;
                const newUnit = form.unit !== undefined ? form.unit : (p.unit || 'br');
                const newEstTime = form.estTime !== undefined && form.estTime !== '' ? Number(form.estTime) : Number(p.totalEstTime) || 0;
                const newCurrent = form.current !== undefined && form.current !== '' ? Number(form.current) : Number(p.currentUnit) || 0;

                if (newTotal <= 0) { if (!confirm('⚠️ Toplam birim 0 veya negatif. Yine de kaydetmek istiyor musun?')) return; }
                else if (newCurrent > newTotal) { if (!confirm(`⚠️ Yapılan (${newCurrent}) toplam hedeften (${newTotal}) büyük. Yine de kaydetmek istiyor musun?`)) return; }

                const oldInitial = Number(p.initialUnit) || 0;
                const oldCurrent = Number(p.currentUnit) || 0;
                const progressFromTasks = Math.max(0, oldCurrent - oldInitial);
                let newInitial = newCurrent - progressFromTasks;

                const newCategory = form.category !== undefined ? form.category : (p.category || '');

                const updatedProjects = projects.map(proj => proj.id === p.id ? {
                    ...proj,
                    title: newTitle,
                    category: newCategory,
                    totalUnit: newTotal,
                    unit: newUnit,
                    totalEstTime: newEstTime,
                    currentUnit: newCurrent,
                    initialUnit: newInitial
                } : proj);

                updateCloud('projects', updatedProjects);
                closeModal();
            };
            const handleBuyReward = (r) => { if (gold >= r.cost && confirm(`${r.icon || '🎁'} "${r.title}" — ${r.cost} altın`)) updateGold(-r.cost); };
            const handleAddReward = () => { if (form.title) { updateCloud('rewards', [...rewards, { id: Date.now(), title: form.title, cost: Number(form.cost), icon: form.icon || '🎁' }]); closeModal(); } };
            const handleDeleteReward = (id) => { if (confirm('Silmek istediğine emin misin?')) updateCloud('rewards', rewards.filter(r => r.id !== id)); };
            const closeModal = () => setModal({ open: false, type: null, data: null });
            const openModal = (type, data = null) => { setModal({ open: true, type, data }); setForm({}); if (type === 'journal') { setForm({ mood: currentDayData.journal?.mood || '😐', note: currentDayData.journal?.note || '' }); } };

            if (loadingUser) return <div className="h-full flex items-center justify-center bg-gray-900 text-white">Yükleniyor...</div>;
            if (!user) return <AuthScreen />;

            // MAINTENANCE MODE GUARD
            if (isMaintenanceMode && userRole !== 'admin' && !isAdminImpersonating) {
                return <MaintenanceScreen />;
            }

            // SUSPENDED GUARD
            if (profile && profile.isSuspended === true && userRole !== 'admin' && !isAdminImpersonating) {
                return <SuspendedScreen />;
            }

            // PENDING APPROVAL GUARD
            if (profile && (profile.role === 'pending_student' || profile.role === 'pending_mentor') && !isAdminImpersonating) {
                return (
                    <div className="h-full flex items-center justify-center p-8" style={{ background: 'linear-gradient(180deg, #0a0a0a 0%, #111 100%)' }}>
                        <div className="text-center max-w-md">
                            <div className="text-7xl mb-6">⏳</div>
                            <h1 className="text-2xl font-extrabold mb-3" style={{ color: '#e5e5e5' }}>Hesabınız İnceleniyor</h1>
                            <p className="text-sm leading-relaxed mb-6" style={{ color: '#555' }}>
                                Hesabınız inceleme aşamasındadır. Yönetici onayından sonra uygulamaya erişebilirsiniz.
                            </p>
                            <div className="inline-flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-bold mb-4" style={{ background: '#1a1a1a', color: '#a16207', border: '1px solid #222' }}>
                                <span className="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                                Onay bekleniyor
                            </div>
                            <div><button onClick={() => auth.signOut()} className="mt-4 px-6 py-2 rounded-xl text-sm font-bold transition" style={{ background: '#1a1a1a', color: '#666', border: '1px solid #222' }}>Çıkış Yap</button></div>
                        </div>
                    </div>
                );
            }

            // ADMIN GOD MODE
            if (userRole === 'admin' && !isAdminImpersonating) {
                return (
                    <AdminPanel
                        user={user}
                        isMaintenanceMode={isMaintenanceMode}
                        setIsMaintenanceMode={setIsMaintenanceMode}
                        onLogout={() => auth.signOut()}
                        onImpersonate={(targetUser) => {
                            // Save real admin identity
                            setRealAdminUser(user);
                            // Fake the user object with target's uid
                            setUser({ ...user, uid: targetUser.uid, email: targetUser.profile?.email || '' });
                            setProfile(targetUser.profile || {});
                            setUserRole(targetUser.profile?.role || 'student');
                            setIsAdminImpersonating(true);
                        }}
                    />
                );
            }

            if (profile && profile.role === 'mentor') {
                return (
                    <React.Fragment>
                        {isAdminImpersonating && (
                            <div style={{ position: 'fixed', top: 12, right: 12, zIndex: 9999 }}>
                                <button
                                    onClick={() => {
                                        setUser(realAdminUser);
                                        setRealAdminUser(null);
                                        setIsAdminImpersonating(false);
                                        setUserRole('admin');
                                        setProfile(null);
                                        setLoadingUser(true);
                                        db.ref(`users/${realAdminUser.uid}/profile`).once('value', (snap) => {
                                            setProfile(snap.val());
                                            setLoadingUser(false);
                                        });
                                    }}
                                    className="px-4 py-2 rounded-xl text-xs font-extrabold uppercase tracking-wider shadow-lg"
                                    style={{ background: 'linear-gradient(135deg, #7f1d1d, #dc2626)', color: '#fecaca', border: '1px solid #991b1b', boxShadow: '0 0 20px rgba(220,38,38,0.4)' }}
                                >
                                    🛑 Gözlemden Çık (Admin'e Dön)
                                </button>
                            </div>
                        )}
                        <MentorDashboard currentUser={user} />
                    </React.Fragment>
                );
            }

            if (profile && profile.role === 'parent') {
                return <ParentDashboard currentUser={user} />;
            }

            return (
                <React.Fragment>
                    {isAdminImpersonating && (
                        <div style={{ position: 'fixed', top: 12, right: 12, zIndex: 9999 }}>
                            <button
                                onClick={() => {
                                    setUser(realAdminUser);
                                    setRealAdminUser(null);
                                    setIsAdminImpersonating(false);
                                    setUserRole('admin');
                                    setProfile(null);
                                    setLoadingUser(true);
                                    db.ref(`users/${realAdminUser.uid}/profile`).once('value', (snap) => {
                                        setProfile(snap.val());
                                        setLoadingUser(false);
                                    });
                                }}
                                className="px-4 py-2 rounded-xl text-xs font-extrabold uppercase tracking-wider shadow-lg"
                                style={{ background: 'linear-gradient(135deg, #7f1d1d, #dc2626)', color: '#fecaca', border: '1px solid #991b1b', boxShadow: '0 0 20px rgba(220,38,38,0.4)' }}
                            >
                                🛑 Gözlemden Çık (Admin'e Dön)
                            </button>
                        </div>
                    )}
                    <StudentUI
                        user={user} profile={profile || {}} activeTab={activeTab} setActiveTab={setActiveTab}
                        selectedDate={selectedDate} setSelectedDate={setSelectedDate}
                        projects={projects} history={history} habits={habits} rewards={rewards}
                        gold={gold} flippedCards={flippedCards} setFlippedCards={setFlippedCards}
                        flippedProjects={flippedProjects} setFlippedProjects={setFlippedProjects}
                        focusMode={focusMode} setFocusMode={setFocusMode}
                        modal={modal}
                        openModal={(type, data) => { setModal({ open: true, type, data }); setForm({}); if (type === 'journal') { setForm({ mood: currentDayData.journal?.mood || '😐', note: currentDayData.journal?.note || '' }); } }}
                        closeModal={() => setModal({ open: false, type: null, data: null })}
                        form={form} setForm={setForm}
                        notificationModal={notificationModal} closeNotification={closeNotification}
                        handleAddProject={handleAddProject}
                        handleEditProject={handleEditProject}
                        handleDeleteProject={(id) => { updateCloud('projects', projects.filter(p => p.id !== id)); }}
                        handleAddTask={handleAddTask}
                        toggleTask={toggleTask}
                        toggleSubItem={toggleSubItem}
                        deleteTask={deleteTask}
                        addHabit={addHabit}
                        deleteHabit={deleteHabit}
                        toggleHabit={toggleHabit}
                        handlePurchase={handleBuyReward}
                        handleAddReward={handleAddReward}
                        handleDeleteReward={handleDeleteReward}
                        handleStartFocus={(t) => setFocusMode({ active: true, taskId: t.id, taskTitle: t.title, timeLeft: Number(t.duration) * 60, isRunning: true })}
                        handleStopFocus={() => setFocusMode({ ...focusMode, active: false })}
                        dateKey={dateKey}
                        todayKey={todayKey}
                        currentDayData={currentDayData}
                        updateCloud={updateCloud}
                        streakFreeze={streakFreeze}
                    />
                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>

</html>
