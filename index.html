<!DOCTYPE html>
<html lang="tr" class="h-full">
<head>
    <!-- AI-ARCHITECTURE-DIRECTIVE: Bu projenin mimari haritası ARCHITECTURE.md dosyasındadır. Yapısal değişikliklerde onu da güncelle. -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ÖğrenciOS — Cloud Edition</title>
    <meta name="description" content="Öğrenci hayatını yönetmek için akıllı planlama, hedef takip ve analiz platformu.">

    <!-- React CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.8/babel.min.js"></script>

    <!-- Firebase v9 Compat CDN -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2"></script>

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- SheetJS (Excel) -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,line-clamp"></script>
    <script>
    tailwind.config = {
        darkMode: 'class',
        theme: {
            extend: {
                fontFamily: {
                    sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                },
            },
        },
    };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        * { -webkit-tap-highlight-color: transparent; }
        html, body, #root { height: 100%; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; }
        input, textarea, select { font-size: 16px !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes slide-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slide-down { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-slide-up { animation: slide-up 0.3s ease-out; }
        .animate-slide-down { animation: slide-down 0.3s ease-out forwards; }
        .animate-fade-in { animation: fade-in 0.3s ease-out; }
        .animate-pulse-slow { animation: pulse-slow 2s ease-in-out infinite; }
        @keyframes checkmark { 0% { transform: scale(0) rotate(45deg); opacity: 0; } 50% { transform: scale(1.2) rotate(0deg); } 100% { transform: scale(1); opacity: 1; } }
        .animate-checkmark { animation: checkmark 0.3s ease-out; }
        @keyframes modal-enter { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .animate-modal { animation: modal-enter 0.2s ease-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.3s ease-in-out; }
        @keyframes pop-in { 0% { opacity: 0; transform: scale(0.8); } 60% { opacity: 1; transform: scale(1.05); } 100% { transform: scale(1); } }
        .animate-pop { animation: pop-in 0.3s ease-out; }
        @keyframes toast-in { 0% { opacity: 0; transform: translateY(20px) scale(0.95); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        .animate-toast-in { animation: toast-in 0.35s cubic-bezier(0.21, 1.02, 0.73, 1) forwards; }
    </style>
</head>

<body>
    <div id="root" class="h-full w-full"></div>

    <!-- === SCRIPT LOADING ORDER (CDN/Babel — NO import/export) === -->
    <!-- 1. Firebase init (db, auth globals) -->
    <script type="text/babel" src="./components/firebase.jsx"></script>
    <!-- 2. Shared constants & utilities (Icons, DEFAULT_*, helpers) -->
    <script type="text/babel" src="./components/globals.jsx"></script>
    <!-- 3. Custom hook for student data (useStudentData) -->
    <script type="text/babel" src="./components/useStudentData.jsx"></script>
    <!-- 4. Standalone UI components -->
    <script type="text/babel" src="./components/AuthScreen.jsx"></script>
    <script type="text/babel" src="./components/SharedComponents.jsx"></script>
    <script type="text/babel" src="./components/AdminPanel.jsx"></script>
    <script type="text/babel" src="./components/MentorPanel.jsx"></script>
    <script type="text/babel" src="./components/StudentUI.jsx"></script>

    <!-- 5. ROOT APP — thin routing/layout shell -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [loadingUser, setLoadingUser] = useState(true);
            const [userRole, setUserRole] = useState('student');
            const [isMaintenanceMode, setIsMaintenanceMode] = useState(false);
            const [isAdminImpersonating, setIsAdminImpersonating] = useState(false);
            const [realAdminUser, setRealAdminUser] = useState(null);
            const [toasts, setToasts] = useState([]);
            const [dataAccordionOpen, setDataAccordionOpen] = useState(false);

            const showToast = (message, type = 'success') => {
                const id = Date.now() + Math.random();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
            };

            // --- useStudentData hook: all student state + actions ---
            const studentData = useStudentData(user, profile, showToast);

            // --- AUTH LISTENER ---
            useEffect(() => {
                let profileUnsub = null;
                const unsubscribe = auth.onAuthStateChanged((currentUser) => {
                    if (currentUser) {
                        setUser(currentUser);
                        db.ref(`users/${currentUser.uid}/profile/lastSeen`).set(Date.now());
                        const profileRef = db.ref(`users/${currentUser.uid}/profile`);
                        profileUnsub = profileRef.on('value', (snap) => {
                            const profileData = snap.val();
                            setProfile(profileData);
                            if (profileData && profileData.role === 'admin') {
                                setUserRole('admin');
                            } else {
                                setUserRole('student');
                            }
                            setLoadingUser(false);
                        });
                    } else {
                        setUser(null);
                        setProfile(null);
                        setUserRole('student');
                        setLoadingUser(false);
                    }
                });
                return () => {
                    unsubscribe();
                    if (profileUnsub && user) {
                        db.ref(`users/${user.uid}/profile`).off('value', profileUnsub);
                    }
                };
            }, []);

            // --- MAINTENANCE MODE LISTENER ---
            useEffect(() => {
                const maintenanceRef = db.ref('system/maintenanceMode');
                maintenanceRef.on('value', (snap) => {
                    setIsMaintenanceMode(snap.val() === true);
                });
                return () => maintenanceRef.off();
            }, []);

            // --- FORCE LOGOUT: deleted/suspended user ---
            useEffect(() => {
                if (!user || userRole === 'admin' || isAdminImpersonating) return;
                const userRef = db.ref('users/' + user.uid);
                const onValue = userRef.on('value', (snap) => {
                    const data = snap.val();
                    if (data === null || data?.profile?.isSuspended === true) {
                        userRef.off('value', onValue);
                        auth.signOut().then(() => {
                            localStorage.clear();
                            window.location.reload();
                        });
                    }
                });
                return () => userRef.off('value', onValue);
            }, [user, userRole, isAdminImpersonating]);

            // --- ROUTING ---
            if (loadingUser) return <div className="h-full flex items-center justify-center bg-gray-900 text-white">Yükleniyor...</div>;
            if (!user) return <AuthScreen />;

            if (isMaintenanceMode && userRole !== 'admin' && !isAdminImpersonating) return <MaintenanceScreen />;
            if (profile && profile.isSuspended === true && userRole !== 'admin' && !isAdminImpersonating) return <SuspendedScreen />;

            if (profile && (profile.role === 'pending_student' || profile.role === 'pending_mentor') && !isAdminImpersonating) {
                return (
                    <div className="h-full flex items-center justify-center p-8" style={{ background: 'linear-gradient(180deg, #0a0a0a 0%, #111 100%)' }}>
                        <div className="text-center max-w-md">
                            <div className="text-7xl mb-6">⏳</div>
                            <h1 className="text-2xl font-extrabold mb-3" style={{ color: '#e5e5e5' }}>Hesabınız İnceleniyor</h1>
                            <p className="text-sm leading-relaxed mb-6" style={{ color: '#555' }}>
                                Hesabınız inceleme aşamasındadır. Yönetici onayından sonra uygulamaya erişebilirsiniz.
                            </p>
                            <div className="inline-flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-bold mb-4" style={{ background: '#1a1a1a', color: '#a16207', border: '1px solid #222' }}>
                                <span className="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                                Onay bekleniyor
                            </div>
                            <div><button onClick={() => auth.signOut()} className="mt-4 px-6 py-2 rounded-xl text-sm font-bold transition" style={{ background: '#1a1a1a', color: '#666', border: '1px solid #222' }}>Çıkış Yap</button></div>
                        </div>
                    </div>
                );
            }

            // ADMIN GOD MODE
            if (userRole === 'admin' && !isAdminImpersonating) {
                return (
                    <AdminPanel
                        user={user}
                        isMaintenanceMode={isMaintenanceMode}
                        setIsMaintenanceMode={setIsMaintenanceMode}
                        onLogout={() => auth.signOut()}
                        onImpersonate={(targetUser) => {
                            setRealAdminUser(user);
                            setUser({ ...user, uid: targetUser.uid, email: targetUser.profile?.email || '' });
                            setProfile(targetUser.profile || {});
                            setUserRole(targetUser.profile?.role || 'student');
                            setIsAdminImpersonating(true);
                        }}
                    />
                );
            }

            // Admin "back" button (shared for mentor & student views)
            const AdminBackButton = () => isAdminImpersonating ? (
                <div style={{ position: 'fixed', top: 12, right: 12, zIndex: 9999 }}>
                    <button
                        onClick={() => {
                            setUser(realAdminUser);
                            setRealAdminUser(null);
                            setIsAdminImpersonating(false);
                            setUserRole('admin');
                            setProfile(null);
                            setLoadingUser(true);
                            db.ref(`users/${realAdminUser.uid}/profile`).once('value', (snap) => {
                                setProfile(snap.val());
                                setLoadingUser(false);
                            });
                        }}
                        className="px-4 py-2 rounded-xl text-xs font-extrabold uppercase tracking-wider shadow-lg"
                        style={{ background: 'linear-gradient(135deg, #7f1d1d, #dc2626)', color: '#fecaca', border: '1px solid #991b1b', boxShadow: '0 0 20px rgba(220,38,38,0.4)' }}
                    >
                        🛑 Gözlemden Çık (Admin'e Dön)
                    </button>
                </div>
            ) : null;

            // MENTOR
            if (profile && profile.role === 'mentor') {
                return (
                    <React.Fragment>
                        <AdminBackButton />
                        <MentorDashboard currentUser={user} showToast={showToast} />
                    </React.Fragment>
                );
            }

            // PARENT
            if (profile && profile.role === 'parent') {
                return <ParentDashboard currentUser={user} />;
            }

            // STUDENT (default)
            return (
                <React.Fragment>
                    <AdminBackButton />
                    <StudentUI
                        globalTags={studentData.globalTags}
                        user={user} profile={profile || {}} activeTab={studentData.activeTab} setActiveTab={studentData.setActiveTab}
                        selectedDate={studentData.selectedDate} setSelectedDate={studentData.setSelectedDate}
                        projects={studentData.projects} history={studentData.history} habits={studentData.habits} rewards={studentData.rewards}
                        gold={studentData.gold} flippedCards={studentData.flippedCards} setFlippedCards={studentData.setFlippedCards}
                        flippedProjects={studentData.flippedProjects} setFlippedProjects={studentData.setFlippedProjects}
                        focusMode={studentData.focusMode} setFocusMode={studentData.setFocusMode}
                        modal={studentData.modal}
                        openModal={studentData.openModal}
                        closeModal={studentData.closeModal}
                        form={studentData.form} setForm={studentData.setForm}
                        notificationModal={studentData.notificationModal} closeNotification={studentData.closeNotification}
                        handleAddProject={studentData.handleAddProject}
                        handleEditProject={studentData.handleEditProject}
                        handleDeleteProject={studentData.handleDeleteProject}
                        handleAddTask={studentData.handleAddTask}
                        toggleTask={studentData.toggleTask}
                        toggleSubItem={studentData.toggleSubItem}
                        deleteTask={studentData.deleteTask}
                        addHabit={studentData.addHabit}
                        deleteHabit={studentData.deleteHabit}
                        toggleHabit={studentData.toggleHabit}
                        handlePurchase={studentData.handleBuyReward}
                        handleAddReward={studentData.handleAddReward}
                        handleDeleteReward={studentData.handleDeleteReward}
                        handleStartFocus={studentData.handleStartFocus}
                        handleStopFocus={studentData.handleStopFocus}
                        dateKey={studentData.dateKey}
                        todayKey={studentData.todayKey}
                        currentDayData={studentData.currentDayData}
                        updateCloud={studentData.updateCloud}
                        streakFreeze={studentData.streakFreeze}
                        showToast={showToast}
                    />
                    {/* TOAST CONTAINER */}
                    <div className="fixed bottom-24 left-1/2 -translate-x-1/2 z-[9999] flex flex-col-reverse items-center gap-2 pointer-events-none w-full max-w-sm px-4">
                        {toasts.map(toast => (
                            <div
                                key={toast.id}
                                className="pointer-events-auto w-full flex items-center gap-3 px-4 py-3 rounded-2xl shadow-2xl text-sm font-semibold animate-toast-in"
                                style={{
                                    background: toast.type === 'error' ? 'linear-gradient(135deg,#1f0a0a,#2d0b0b)' : toast.type === 'info' ? 'linear-gradient(135deg,#0a0f1f,#0f172a)' : 'linear-gradient(135deg,#0a1f12,#0f2d1b)',
                                    border: `1px solid ${toast.type === 'error' ? '#7f1d1d' : toast.type === 'info' ? '#1e3a8a' : '#14532d'}`,
                                    boxShadow: `0 8px 32px ${toast.type === 'error' ? 'rgba(220,38,38,0.25)' : toast.type === 'info' ? 'rgba(99,102,241,0.25)' : 'rgba(34,197,94,0.25)'}`
                                }}
                            >
                                <span className="text-lg flex-shrink-0">
                                    {toast.type === 'error' ? '❌' : toast.type === 'info' ? 'ℹ️' : '✅'}
                                </span>
                                <span style={{ color: toast.type === 'error' ? '#fca5a5' : toast.type === 'info' ? '#a5b4fc' : '#86efac' }}>
                                    {toast.message}
                                </span>
                            </div>
                        ))}
                    </div>
                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>

</body>

</html>
