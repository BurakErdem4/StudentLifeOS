        const DEFAULT_REWARDS = [
            { id: 1, title: "1 Bölüm Dizi", cost: 50, icon: "🎬" },
            { id: 2, title: "Kahve Molası", cost: 20, icon: "☕" },
            { id: 3, title: "30 Dk Oyun", cost: 40, icon: "🎮" },
            { id: 4, title: "Tatlı/Çikolata", cost: 30, icon: "🍫" },
            { id: 5, title: "Geç Uyanma", cost: 80, icon: "🛌" },
            { id: 6, title: "Dışarda Yemek", cost: 100, icon: "🍔" },
            { id: 7, title: "Sosyal Medya", cost: 20, icon: "📱" },
            { id: 8, title: "Yeni Kitap", cost: 150, icon: "📚" },
            { id: 9, title: "Film Gecesi", cost: 80, icon: "🍿" },
            { id: 10, title: "Tembellik Hakkı", cost: 50, icon: "🦥" }
        ];
        const DEFAULT_HABITS = [
            { id: 'h1', title: 'Yatağı Topla', icon: '🛏️' },
            { id: 'h2', title: 'Kitap Oku', icon: '📖' },
            { id: 'h3', title: 'Yarınını Planla', icon: '📋' },
            { id: 'h4', title: 'Alarmı Erteleme', icon: '⏰' }
        ];

        function AuthScreen() {
            const [isLogin, setIsLogin] = useState(true);
            const [role, setRole] = useState('student');
            const [name, setName] = useState("");
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [parentCode, setParentCode] = useState("");
            const [error, setError] = useState("");
            const [loading, setLoading] = useState(false);

            const handleAuth = async (e) => {
                e.preventDefault();
                setError("");
                setLoading(true);
                try {
                    let userCredential;
                    if (isLogin) {
                        userCredential = await auth.signInWithEmailAndPassword(email, password);
                    } else {
                        // Veli kodu doğrulama
                        if (role === 'parent') {
                            if (!parentCode.trim()) { setError('Lütfen öğrenci kodunu girin.'); setLoading(false); return; }

                            // 1. Önce hesabı oluştur (authenticated olmadan DB sorgusu yapılamaz)
                            userCredential = await auth.createUserWithEmailAndPassword(email, password);

                            // 2. Şimdi authenticated olarak kodu doğrula
                            try {
                                const snap = await db.ref('users').orderByChild('pairingCode').equalTo(parentCode.trim().toUpperCase()).once('value');
                                if (!snap.exists()) {
                                    // Kod geçersiz → hesabı sil
                                    await userCredential.user.delete();
                                    setError('Geçersiz Öğrenci Kodu. Lütfen kodunuzu kontrol edin.');
                                    setLoading(false);
                                    return;
                                }
                                const linkedStudentId = Object.keys(snap.val())[0];

                                await db.ref(`users/${userCredential.user.uid}/profile`).set({
                                    name: name || 'Veli',
                                    email: email,
                                    role: 'parent',
                                    linkedStudentId: linkedStudentId
                                });
                            } catch (queryErr) {
                                // Sorgu hatası → hesabı sil
                                await userCredential.user.delete();
                                throw queryErr;
                            }
                        } else {
                            userCredential = await auth.createUserWithEmailAndPassword(email, password);
                            // Check approval flags from system config
                            let finalRole = role;
                            if (role === 'student' || role === 'mentor') {
                                const sysSnap = await db.ref('system').once('value');
                                const sysData = sysSnap.val() || {};
                                if (role === 'student' && sysData.requireStudentApproval === true) finalRole = 'pending_student';
                                if (role === 'mentor' && sysData.requireMentorApproval === true) finalRole = 'pending_mentor';
                            }
                            await db.ref(`users/${userCredential.user.uid}/profile`).set({
                                name: name || 'User',
                                email: email,
                                role: finalRole
                            });
                            // Auto-seed for new students
                            if (finalRole === 'student') {
                                await db.ref(`users/${userCredential.user.uid}`).update({
                                    habits: DEFAULT_HABITS,
                                    rewards: DEFAULT_REWARDS,
                                    gold: 0
                                });
                            }
                        }
                    }
                } catch (err) {
                    setError(err.message.replace("Firebase:", "").trim());
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="flex flex-col items-center justify-center h-full bg-gray-900 text-white p-6">
                    <div className="w-full max-w-sm bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700">
                        <h1 className="text-3xl font-thin tracking-widest text-center mb-2">mylifeOS</h1>
                        <p className="text-gray-400 dark:text-slate-400 text-center text-xs tracking-wide mb-8">CLOUD EDITION</p>

                        <form onSubmit={handleAuth} className="space-y-4">
                            {!isLogin && (
                                <>
                                    <div className="flex bg-gray-700 rounded-lg p-1 mb-2">
                                        <button type="button" onClick={() => setRole('student')} className={`flex-1 py-1 rounded text-xs font-bold ${role === 'student' ? 'bg-indigo-600 text-white' : 'text-gray-400 dark:text-slate-400'}`}>Öğrenci</button>
                                        <button type="button" onClick={() => setRole('mentor')} className={`flex-1 py-1 rounded text-xs font-bold ${role === 'mentor' ? 'bg-green-600 text-white' : 'text-gray-400 dark:text-slate-400'}`}>Mentor</button>
                                        <button type="button" onClick={() => setRole('parent')} className={`flex-1 py-1 rounded text-xs font-bold ${role === 'parent' ? 'bg-amber-500 text-white' : 'text-gray-400 dark:text-slate-400'}`}>Veli</button>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 dark:text-slate-400 ml-1">İSİM</label>
                                        <input type="text" required className="w-full bg-gray-700 text-white p-3 rounded-xl mt-1 focus:ring-2 ring-indigo-500 border-none" value={name} onChange={e => setName(e.target.value)} />
                                    </div>
                                    {role === 'parent' && (
                                        <div>
                                            <label className="text-xs font-bold text-gray-500 dark:text-slate-400 ml-1">ÖĞRENCİ KODU</label>
                                            <input type="text" required maxLength={6} placeholder="6 haneli kod" className="w-full bg-gray-700 text-white p-3 rounded-xl mt-1 focus:ring-2 ring-amber-500 border-none uppercase tracking-widest text-center font-mono font-bold text-lg" value={parentCode} onChange={e => setParentCode(e.target.value.toUpperCase())} />
                                            <p className="text-gray-500 dark:text-slate-400 text-[10px] mt-1 ml-1">Öğrencinizin profilindeki 6 haneli kodu girin</p>
                                        </div>
                                    )}
                                </>
                            )}
                            <div>
                                <label className="text-xs font-bold text-gray-500 dark:text-slate-400 ml-1">E-POSTA</label>
                                <input type="email" required className="w-full bg-gray-700 text-white p-3 rounded-xl mt-1 focus:ring-2 ring-indigo-500 border-none" value={email} onChange={e => setEmail(e.target.value)} />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-gray-500 dark:text-slate-400 ml-1">ŞİFRE</label>
                                <input type="password" required className="w-full bg-gray-700 text-white p-3 rounded-xl mt-1 focus:ring-2 ring-indigo-500 border-none" value={password} onChange={e => setPassword(e.target.value)} />
                            </div>

                            {error && <div className="text-red-400 text-xs bg-red-900/30 p-2 rounded">{error}</div>}

                            <button disabled={loading} type="submit" className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl transition-all disabled:opacity-50">
                                {loading ? 'İşleniyor...' : (isLogin ? 'Giriş Yap' : 'Kayıt Ol')}
                            </button>
                        </form>

                        <div className="mt-6 text-center">
                            <button onClick={() => setIsLogin(!isLogin)} className="text-gray-400 dark:text-slate-400 text-sm hover:text-white transition">
                                {isLogin ? 'Hesabın yok mu? Kayıt Ol' : 'Zaten hesabın var mı? Giriş Yap'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }



        // --- 6 RENKLİ SİSTEM YARDIMCISI (Color + Text) ---
        const getStatusInfo = (percent, hasTasks) => {
            if (!hasTasks) return { color: "#F3F4F6", text: "Plan Yok", textColor: "#9CA3AF" }; // Boş
            if (percent === 0) return { color: "#9CA3AF", text: "Henüz Başlamadın...", textColor: "white" }; // Gri (0%)
            if (percent <= 20) return { color: "#EF4444", text: "Harekete Geç!", textColor: "white" }; // Kırmızı
            if (percent <= 40) return { color: "#F97316", text: "Isınıyorsun 🔥", textColor: "white" }; // Turuncu
            if (percent <= 60) return { color: "#EAB308", text: "Yarıladın 🚀", textColor: "white" }; // Sarı
            if (percent < 100) return { color: "#22C55E", text: "Harika Gidiyorsun", textColor: "white" }; // Yeşil
            return { color: "#06B6D4", text: "Efsane Bir Gün 💎", textColor: "white" }; // Turkuaz
        };

        const getProgressColor = (percent) => getStatusInfo(percent, true).color;

        // --- ANALYTICS COMPONENT ---
        const ProjectAnalyticsChart = ({ student }) => {
            const canvasRef = React.useRef(null);
            const [range, setRange] = useState('1m'); // 1w, 1m, 3m, 6m
            const [metric, setMetric] = useState('cumulative'); // 'cumulative' | 'velocity'
            const [chartOffset, setChartOffset] = useState(0); // 0 = current, -1 = prev window
            const [activeFilter, setActiveFilter] = useState('ALL'); // 'ALL' | project.id
            const chartInstance = React.useRef(null);

            // Techy/Dark Mode Colors
            const colors = ['#818cf8', '#f472b6', '#fbbf24', '#34d399', '#60a5fa'];

            // Reset offset when range changes
            useEffect(() => {
                setChartOffset(0);
            }, [range]);

            useEffect(() => {
                if (!student || !student.projects || student.projects.length === 0) return;
                const ctx = canvasRef.current.getContext('2d');

                const getDateKey = (date) => {
                    const year = date.getFullYear();
                    const month = String(date.getMonth() + 1).padStart(2, '0');
                    const day = String(date.getDate()).padStart(2, '0');
                    return `${year}-${month}-${day}`;
                };

                // 1. Determine Date Range based on Offset
                let days = 30;
                if (range === '1w') days = 7;
                if (range === '1m') days = 30;
                if (range === '3m') days = 90;
                if (range === '6m') days = 180;

                const now = new Date();
                const endDate = new Date(now);
                endDate.setDate(endDate.getDate() + (chartOffset * days));

                const startDate = new Date(endDate);
                startDate.setDate(startDate.getDate() - days);

                // 2. Prepare Data Structure
                const labels = [];
                const projectData = {};

                // Init project data containers
                student.projects.forEach((p, i) => {
                    projectData[p.id] = {
                        id: p.id,
                        label: p.title,
                        data: [],
                        rawValues: [],
                        totalUnit: Number(p.totalUnit) || 100, // EXCEL KORUMASI EKLENDİ
                        unit: p.unit || 'br',
                        borderColor: colors[i % colors.length],
                        backgroundColor: colors[i % colors.length] + '20',
                        borderWidth: 2,
                        pointRadius: 0,
                        pointHoverRadius: 6,
                        tension: 0.4,
                        currentRawTotal: 0
                    };
                });

                // 3. Process History
                const allDates = [];
                const iterator = new Date(startDate);
                while (iterator <= endDate) {
                    allDates.push(new Date(iterator));
                    iterator.setDate(iterator.getDate() + 1);
                }

                // 🔥 ALT GÖREVLERİ (SUBITEMS) HESAPLAYAN AKILLI FONKSİYON 🔥
                const calculateTaskGain = (task) => {
                    // Eğer alt görev (kutucuklar) varsa, işaretli olanların sayısını döndür
                    if (task.subItems && Array.isArray(task.subItems)) {
                        return task.subItems.filter(Boolean).length;
                    }
                    // Alt görev yoksa ve tek seferlik görev tamamen bittiyse hedef miktarı döndür
                    if (task.completed) {
                        return Number(task.targetAmount) || 1;
                    }
                    return 0; // Hiçbiri değilse ilerleme yok
                };

                // 3a. Calculate Initial State (Sum of all tasks BEFORE startDate)
                const projectInitialTotals = {};
                student.projects.forEach(p => projectInitialTotals[p.id] = 0);

                if (metric === 'cumulative') {
                    const startKey = getDateKey(startDate);
                    const historyKeys = Object.keys(student.history || {}).sort();

                    historyKeys.forEach(k => {
                        if (k < startKey) {
                            const dayData = student.history[k];
                            if (dayData && dayData.tasks) {
                                student.projects.forEach(p => {
                                    const gained = dayData.tasks
                                        // ID_ KORUMASI
                                        .filter(t => String(t.pid).replace("ID_", "") === String(p.id).replace("ID_", ""))
                                        .reduce((acc, t) => acc + calculateTaskGain(t), 0); // YENİ FONKSİYON KULLANILDI
                                    projectInitialTotals[p.id] += gained;
                                });
                            }
                        }
                    });
                }

                // Initialize currentRawTotal with what was done before this window + initialUnit
                student.projects.forEach(p => {
                    projectData[p.id].currentRawTotal = projectInitialTotals[p.id] + (Number(p.initialUnit) || 0);
                });

                // 3b. Process Dates in Window
                allDates.forEach(date => {
                    const k = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
                    labels.push(date.toLocaleDateString('tr-TR', { day: 'numeric', month: 'short' }));

                    const dayData = (student.history && student.history[k]) ? student.history[k] : { tasks: [] };

                    student.projects.forEach(p => {
                        const gainedToday = (dayData.tasks || [])
                            // ID_ KORUMASI
                            .filter(t => String(t.pid).replace("ID_", "") === String(p.id).replace("ID_", ""))
                            .reduce((acc, t) => acc + calculateTaskGain(t), 0); // YENİ FONKSİYON KULLANILDI

                        projectData[p.id].currentRawTotal += gainedToday;

                        // DATA LOGIC: Cumulative vs Velocity
                        if (metric === 'cumulative') {
                            const pct = Math.min(100, (projectData[p.id].currentRawTotal / projectData[p.id].totalUnit) * 100);
                            projectData[p.id].data.push(pct);
                            projectData[p.id].rawValues.push(projectData[p.id].currentRawTotal);
                        } else {
                            const dailyPct = (gainedToday / projectData[p.id].totalUnit) * 100;
                            projectData[p.id].data.push(dailyPct);
                            projectData[p.id].rawValues.push(gainedToday);
                        }
                    });
                });

                // --- FILTER LOGIC ---
                let filteredDatasets = Object.values(projectData);
                if (activeFilter !== 'ALL') {
                    // ID_ KORUMASI
                    filteredDatasets = filteredDatasets.filter(ds => String(ds.id).replace("ID_", "") === String(activeFilter).replace("ID_", ""));
                }

                // 4. Create Chart
                if (chartInstance.current) chartInstance.current.destroy();

                // Y-Axis Scale Logic
                let yMin = 0;
                let yMax = 100;

                if (metric === 'cumulative') {
                    let startValue = 100;
                    let hasData = false;

                    filteredDatasets.forEach(ds => {
                        if (ds.data.length > 0) {
                            const val = ds.data[0];
                            if (val < startValue) startValue = val;
                            hasData = true;
                        }
                    });
                    if (!hasData) startValue = 0;

                    let currentMax = 0;
                    filteredDatasets.forEach(ds => {
                        const dsMax = Math.max(...ds.data);
                        if (dsMax > currentMax) currentMax = dsMax;
                    });

                    let baseRange = 15;
                    if (range === '1w') baseRange = 5;
                    if (range === '1m') baseRange = 15;
                    if (range === '3m') baseRange = 40;
                    if (range === '6m') baseRange = 80;

                    const actualDelta = currentMax - startValue;
                    let targetRange = baseRange;
                    let attempts = 0;
                    while (actualDelta > targetRange && attempts < 50) {
                        targetRange = targetRange * 1.2;
                        attempts++;
                    }

                    yMin = startValue;
                    yMax = Math.min(startValue + targetRange, 100);

                } else {
                    yMax = undefined;
                }

                filteredDatasets.forEach(ds => {
                    if (metric === 'velocity') ds.fill = true;
                });

                chartInstance.current = new Chart(ctx, {
                    type: 'line',
                    data: { labels, datasets: filteredDatasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        scales: {
                            y: {
                                beginAtZero: metric === 'velocity',
                                min: yMin,
                                max: yMax,
                                suggestedMax: metric === 'velocity' ? 12 : undefined,
                                grid: { color: 'rgba(255,255,255,0.05)' },
                                ticks: { color: '#9ca3af' },
                                border: { display: false }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { color: '#9ca3af' },
                                border: { display: false }
                            }
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: '#1f2937',
                                titleColor: '#f3f4f6',
                                bodyColor: '#d1d5db',
                                callbacks: {
                                    label: (ctx) => {
                                        const dataset = ctx.dataset;
                                        const raw = dataset.rawValues[ctx.dataIndex];
                                        return `${dataset.label}: ${Math.round(raw)}/${dataset.totalUnit} ${dataset.unit}`;
                                    }
                                }
                            }
                        }
                    }
                });

                return () => {
                    if (chartInstance.current) chartInstance.current.destroy();
                };
            }, [student, range, metric, chartOffset, activeFilter]);

            if (!student.projects || student.projects.length === 0) return <div className="p-8 text-center text-gray-400 text-xs">Analiz için aktif hedef bulunamadı.</div>;

            return (
                <div className="bg-gray-900 p-5 rounded-3xl shadow-2xl border border-gray-800">
                    <div className="flex justify-between items-center mb-6">
                        <div>
                            <div className="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 flex items-center gap-2">
                                <span className="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span>

                            </div>

                                <button onClick={() => setMetric('cumulative')} className={`text-xs font-bold px-4 py-1.5 rounded-xl transition ${metric === 'cumulative' ? 'bg-indigo-500/20 text-indigo-400 ring-1 ring-indigo-500/50' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>İlerleme</button>
                                <button onClick={() => setMetric('velocity')} className={`text-xs font-bold px-4 py-1.5 rounded-xl transition ${metric === 'velocity' ? 'bg-indigo-500/20 text-indigo-400 ring-1 ring-indigo-500/50' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>Hız</button>
                            </div>
                        </div>
                        <div className="flex bg-gray-800 rounded-lg p-1 items-center">
                            <button onClick={() => setChartOffset(c => c - 1)} className="px-2 py-1 text-gray-400 hover:text-white transition">←</button>
                            {['1w', '1m', '3m', '6m'].map(r => (
                                <button key={r} onClick={() => setRange(r)} className={`px-3 py-1 text-[10px] font-bold rounded-md transition ${range === r ? 'bg-gray-700 text-white shadow-sm' : 'text-gray-500 hover:text-gray-300'}`}>{r.toUpperCase()}</button>
                            ))}
                            <button disabled={chartOffset === 0} onClick={() => setChartOffset(c => c + 1)} className={`px-2 py-1 transition ${chartOffset === 0 ? 'text-gray-700 cursor-not-allowed' : 'text-gray-400 hover:text-white'}`}>→</button>
                        </div>
                    </div>

                    <div className="relative h-64 w-full mb-4">
                        <canvas ref={canvasRef} />

        // --- ERROR BOUNDARY ---
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null, errorInfo: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true };
            }

            componentDidCatch(error, errorInfo) {
                this.setState({ error, errorInfo });
                console.error("Uncaught error:", error, errorInfo);
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-4 bg-red-50 text-red-900 h-screen overflow-auto font-mono text-sm">
                            <h1 className="text-2xl font-bold mb-4">Uygulama Hatası (Crash)</h1>
                            <p className="mb-2">Bir hata oluştu ve uygulama durduruldu.</p>
                            <div className="bg-red-100 p-4 rounded mb-4 overflow-auto border border-red-200">
                                <strong className="block mb-2">Hata Mesajı:</strong>
                                {this.state.error && this.state.error.toString()}
                            </div>
                            <div className="bg-gray-100 p-4 rounded overflow-auto border border-gray-200 dark:border-slate-700 h-96">
                                <strong className="block mb-2">Stack Trace:</strong>
                                {this.state.errorInfo && this.state.errorInfo.componentStack}
                            </div>
                            <button onClick={() => window.location.reload()} className="mt-4 px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">
                                Sayfayı Yenile
                            </button>
                        </div>
                    );
                }

                return this.props.children;
            }
        }

            useEffect(() => {

            useEffect(() => {
                let profileUnsub = null;
                const unsubscribe = auth.onAuthStateChanged((currentUser) => {
                    if (currentUser) {
                        setUser(currentUser);
                        // Write lastSeen on every login (non-admin)
                        db.ref(`users/${currentUser.uid}/profile/lastSeen`).set(Date.now());
                        // on() ile dinle → profil sonradan yazılsa bile yakalar
                        const profileRef = db.ref(`users/${currentUser.uid}/profile`);
                        profileUnsub = profileRef.on('value', (snap) => {
                            const profileData = snap.val();
                            setProfile(profileData);
                            // Admin detection from DB role
                            if (profileData && profileData.role === 'admin') {
                                setUserRole('admin');
                            } else {

                        });

                        setUserRole('student');
                        setLoadingUser(false);

                });
                return () => {
                    unsubscribe();
                    if (profileUnsub && user) {

            }, []);

            useEffect(() => {

                // First, clear any old notifications
                notifRef.once('value', (snapshot) => {

                    if (existing) {
                        // Remove old notifications silently
                        Object.keys(existing).forEach(key => {
                            db.ref(`users/${user.uid}/notifications/${key}`).remove();
                        });
                    }
                    initialLoad = false;
                });

                // Then listen for truly new ones
                notifRef.on('child_added', (snapshot) => {
                    if (initialLoad) return; // Skip notifications that existed before mount
                    const val = snapshot.val();
                    if (val) {
                        setNotificationModal({ id: snapshot.key, ...val });
                        if (val.type === 'celebrate' || val.gold > 0) {

            const closeNotification = () => {

                        gold: notificationModal.gold || 0,

                        type: notificationModal.type || 'message'

            useEffect(() => {

                        setRewards(data.rewards || DEFAULT_REWARDS);

                        setStreakFreeze(data.streakFreeze || 0);
                    }
                });
                return () => userRef.off();
            }, [user]);

            // Streak Freeze auto-consume
            useEffect(() => {
                if (!user || !history || Object.keys(history).length === 0 || streakFreeze <= 0) return;
                const gdk = (d) => {
                    const y = d.getFullYear();
                    const m = String(d.getMonth() + 1).padStart(2, '0');
                    const dd = String(d.getDate()).padStart(2, '0');
                    return `${y}-${m}-${dd}`;
                };
                const isDayFailed = (dayData) => {
                    if (!dayData) return true;
                    if (dayData.frozen === true) return false;
                    const tasks = dayData.tasks || [];
                    const hasTask = tasks.some(t => t.completed || (t.subItems && t.subItems.some(Boolean)));
                    const hasHabit = (dayData.habits || []).length > 0;
                    return !(hasTask && hasHabit);
                };
                let freezesLeft = streakFreeze;
                for (let i = 1; i <= 3 && freezesLeft > 0; i++) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const key = gdk(d);
                    const dayData = history[key];
                    if (isDayFailed(dayData)) {
                        updateCloud(`history/${key}/frozen`, true);
                        freezesLeft--;
                        updateCloud('streakFreeze', freezesLeft);
                    }
                }

            const updateCloud = (path, value) => { if (!user) return; db.ref(`users/${user.uid}/${path}`).set(value); };

                    const targetProject = projects.find(p => String(p.id) === String(task.pid));
                    if (targetProject) {
                        const newCurrent = Math.max(0, targetProject.currentUnit + (wasDone ? -1 : 1));

                        updateCloud('projects', updatedProjects);

            const processGlobalTags = (items) => {
                const newTopics = new Set();

                const newEstTime = form.estTime !== undefined && form.estTime !== '' ? Number(form.estTime) : Number(p.totalEstTime) || 0;
                const newCurrent = form.current !== undefined && form.current !== '' ? Number(form.current) : Number(p.currentUnit) || 0;

                if (newTotal <= 0) { if (!confirm('⚠️ Toplam birim 0 veya negatif. Yine de kaydetmek istiyor musun?')) return; }
                else if (newCurrent > newTotal) { if (!confirm(`⚠️ Yapılan (${newCurrent}) toplam hedeften (${newTotal}) büyük. Yine de kaydetmek istiyor musun?`)) return; }

                const oldInitial = Number(p.initialUnit) || 0;
                const oldCurrent = Number(p.currentUnit) || 0;
                const progressFromTasks = Math.max(0, oldCurrent - oldInitial);
                let newInitial = newCurrent - progressFromTasks;

                const newCategory = form.category !== undefined ? form.category : (p.category || '');

                const updatedProjects = projects.map(proj => proj.id === p.id ? {
                    ...proj,
                    title: newTitle,
                    category: newCategory,
                    totalUnit: newTotal,
                    unit: newUnit,
                    totalEstTime: newEstTime,
                    currentUnit: newCurrent,
                    initialUnit: newInitial,
                    projectItems: items
                } : proj);

                updateCloud('projects', updatedProjects);
                processGlobalTags(items);
                closeModal();

            const handleBuyReward = (r) => { if (gold >= r.cost && confirm(`${r.icon || '🎁'} "${r.title}" — ${r.cost} altın`)) updateGold(-r.cost); };
            const handleAddReward = () => { if (form.title) { updateCloud('rewards', [...rewards, { id: Date.now(), title: form.title, cost: Number(form.cost), icon: form.icon || '🎁' }]); closeModal(); } };
            const handleDeleteReward = (id) => { if (confirm('Silmek istediğine emin misin?')) updateCloud('rewards', rewards.filter(r => r.id !== id)); };

                let newForm = {};
                if (type === 'journal') { 
                    newForm = { mood: currentDayData.journal?.mood || '😐', note: currentDayData.journal?.note || '' }; 
                } else if (type === 'project') {
                    let pItems = data?.projectItems ? (Array.isArray(data.projectItems) ? [...data.projectItems] : Object.values(data.projectItems)) : [];
                    // Fallback backward compatibility for old format projects
                    if (!data?.projectItems && data?.title) {
                        pItems = [{ id: Date.now(), topic: data.title, source: '', type: '', amount: Number(data.totalUnit) || 0, unit: data.unit || 'Sayfa' }];
                    } else if (pItems.length === 0) {
                        pItems = [{ id: Date.now(), topic: '', source: '', type: '', amount: 0, unit: 'Sayfa' }];
                    }
                    newForm = { ...data, projectItems: pItems };
                }
                setForm(newForm); 
            };

            // Auto-open journal modal ONCE per session+day
            useEffect(() => {
                if (!todayKey || !user) return;
                // Session guard: if we've already triggered this session, never again
                if (journalAutoOpened.current) return;
                // Persistence guard: if localStorage says shown today, lock ref and stop
                if (localStorage.getItem('pulseShown_' + todayKey)) {
                    journalAutoOpened.current = true;
                    return;
                }
                // Data guard: if journal already has content, mark and stop
                const alreadyFilled = !!(currentDayData?.journal?.mood || currentDayData?.journal?.note);
                if (alreadyFilled) {
                    journalAutoOpened.current = true;
                    localStorage.setItem('pulseShown_' + todayKey, 'true');
                    return;
                }
                // Lock immediately so no parallel timer can be created
                journalAutoOpened.current = true;
                const t = setTimeout(() => { openModal('journal'); }, 1500);
                return () => clearTimeout(t);
            }, [todayKey, user, currentDayData?.journal?.mood, currentDayData?.journal?.note]);

            if (loadingUser) return <div className="h-full flex items-center justify-center bg-gray-900 text-white">Yükleniyor...</div>;
            if (!user) return <AuthScreen />;

            // MAINTENANCE MODE GUARD
            if (isMaintenanceMode && userRole !== 'admin' && !isAdminImpersonating) {
                return <MaintenanceScreen />;
            }

            // SUSPENDED GUARD
            if (profile && profile.isSuspended === true && userRole !== 'admin' && !isAdminImpersonating) {
                return <SuspendedScreen />;
            }

            // PENDING APPROVAL GUARD
            if (profile && (profile.role === 'pending_student' || profile.role === 'pending_mentor') && !isAdminImpersonating) {
                return (
                    <div className="h-full flex items-center justify-center p-8" style={{ background: 'linear-gradient(180deg, #0a0a0a 0%, #111 100%)' }}>
                        <div className="text-center max-w-md">
                            <div className="text-7xl mb-6">⏳</div>
                            <h1 className="text-2xl font-extrabold mb-3" style={{ color: '#e5e5e5' }}>Hesabınız İnceleniyor</h1>
                            <p className="text-sm leading-relaxed mb-6" style={{ color: '#555' }}>
                                Hesabınız inceleme aşamasındadır. Yönetici onayından sonra uygulamaya erişebilirsiniz.
                            </p>
                            <div className="inline-flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-bold mb-4" style={{ background: '#1a1a1a', color: '#a16207', border: '1px solid #222' }}>
                                <span className="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                                Onay bekleniyor
                            </div>
                            <div><button onClick={() => auth.signOut()} className="mt-4 px-6 py-2 rounded-xl text-sm font-bold transition" style={{ background: '#1a1a1a', color: '#666', border: '1px solid #222' }}>Çıkış Yap</button></div>
                        </div>
                    </div>
                );
            }

            // ADMIN GOD MODE
            if (userRole === 'admin' && !isAdminImpersonating) {
                return (
                    <AdminPanel
                        user={user}
                        isMaintenanceMode={isMaintenanceMode}
                        setIsMaintenanceMode={setIsMaintenanceMode}
                        onLogout={() => auth.signOut()}
                        onImpersonate={(targetUser) => {
                            // Save real admin identity
                            setRealAdminUser(user);
                            // Fake the user object with target's uid
                            setUser({ ...user, uid: targetUser.uid, email: targetUser.profile?.email || '' });
                            setProfile(targetUser.profile || {});
                            setUserRole(targetUser.profile?.role || 'student');
                            setIsAdminImpersonating(true);
                        }}
                    />
                );
            }

            if (profile && profile.role === 'mentor') {
                return (
                    <React.Fragment>
                        {isAdminImpersonating && (
                            <div style={{ position: 'fixed', top: 12, right: 12, zIndex: 9999 }}>
                                <button
                                    onClick={() => {
                                        setUser(realAdminUser);
                                        setRealAdminUser(null);
                                        setIsAdminImpersonating(false);
                                        setUserRole('admin');
                                        setProfile(null);
                                        setLoadingUser(true);
                                        db.ref(`users/${realAdminUser.uid}/profile`).once('value', (snap) => {
                                            setProfile(snap.val());
                                            setLoadingUser(false);
                                        });
                                    }}
                                    className="px-4 py-2 rounded-xl text-xs font-extrabold uppercase tracking-wider shadow-lg"
                                    style={{ background: 'linear-gradient(135deg, #7f1d1d, #dc2626)', color: '#fecaca', border: '1px solid #991b1b', boxShadow: '0 0 20px rgba(220,38,38,0.4)' }}
                                >
                                    🛑 Gözlemden Çık (Admin'e Dön)
                                </button>
                            </div>
                        )}
                        <MentorDashboard currentUser={user} />
                    </React.Fragment>
                );
            }

            if (profile && profile.role === 'parent') {
                return <ParentDashboard currentUser={user} />;
            }

            return (
                <React.Fragment>
                    {isAdminImpersonating && (
                        <div style={{ position: 'fixed', top: 12, right: 12, zIndex: 9999 }}>
                            <button
                                onClick={() => {
                                    setUser(realAdminUser);
                                    setRealAdminUser(null);
                                    setIsAdminImpersonating(false);
                                    setUserRole('admin');
                                    setProfile(null);
                                    setLoadingUser(true);
                                    db.ref(`users/${realAdminUser.uid}/profile`).once('value', (snap) => {
                                        setProfile(snap.val());
                                        setLoadingUser(false);
                                    });
                                }}
                                className="px-4 py-2 rounded-xl text-xs font-extrabold uppercase tracking-wider shadow-lg"
                                style={{ background: 'linear-gradient(135deg, #7f1d1d, #dc2626)', color: '#fecaca', border: '1px solid #991b1b', boxShadow: '0 0 20px rgba(220,38,38,0.4)' }}
                            >
                                🛑 Gözlemden Çık (Admin'e Dön)
                            </button>
                        </div>
                    )}
                    <StudentUI
                        globalTags={globalTags}
                        user={user} profile={profile || {}} activeTab={activeTab} setActiveTab={setActiveTab}
                        selectedDate={selectedDate} setSelectedDate={setSelectedDate}
                        projects={projects} history={history} habits={habits} rewards={rewards}
                        gold={gold} flippedCards={flippedCards} setFlippedCards={setFlippedCards}
                        flippedProjects={flippedProjects} setFlippedProjects={setFlippedProjects}
                        focusMode={focusMode} setFocusMode={setFocusMode}
                        modal={modal}
                        openModal={openModal}
                        closeModal={() => setModal({ open: false, type: null, data: null })}
                        form={form} setForm={setForm}
                        notificationModal={notificationModal} closeNotification={closeNotification}
                        handleAddProject={handleAddProject}
                        handleEditProject={handleEditProject}
                        handleDeleteProject={(id) => { updateCloud('projects', projects.filter(p => p.id !== id)); }}
                        handleAddTask={handleAddTask}
                        toggleTask={toggleTask}
                        toggleSubItem={toggleSubItem}
                        deleteTask={deleteTask}
                        addHabit={addHabit}
                        deleteHabit={deleteHabit}
                        toggleHabit={toggleHabit}
                        handlePurchase={handleBuyReward}
                        handleAddReward={handleAddReward}
                        handleDeleteReward={handleDeleteReward}
                        handleStartFocus={(t) => setFocusMode({ active: true, taskId: t.id, taskTitle: t.title, timeLeft: Number(t.duration) * 60, isRunning: true })}
                        handleStopFocus={() => setFocusMode({ ...focusMode, active: false })}
                        dateKey={dateKey}
                        todayKey={todayKey}
                        currentDayData={currentDayData}
                        updateCloud={updateCloud}
                        streakFreeze={streakFreeze}
                    />
                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>

</html>
