        const DEFAULT_REWARDS = [
            { id: 1, title: "1 Bölüm Dizi", cost: 50, icon: "🎬" },
            { id: 2, title: "Kahve Molası", cost: 20, icon: "☕" },
            { id: 3, title: "30 Dk Oyun", cost: 40, icon: "🎮" },
            { id: 4, title: "Tatlı/Çikolata", cost: 30, icon: "🍫" },
            { id: 5, title: "Geç Uyanma", cost: 80, icon: "🛌" },
            { id: 6, title: "Dışarda Yemek", cost: 100, icon: "🍔" },
            { id: 7, title: "Sosyal Medya", cost: 20, icon: "📱" },
            { id: 8, title: "Yeni Kitap", cost: 150, icon: "📚" },
            { id: 9, title: "Film Gecesi", cost: 80, icon: "🍿" },
            { id: 10, title: "Tembellik Hakkı", cost: 50, icon: "🦥" }
        ];
        const DEFAULT_HABITS = [
            { id: 'h1', title: 'Yatağı Topla', icon: '🛏️' },
            { id: 'h2', title: 'Kitap Oku', icon: '📖' },
            { id: 'h3', title: 'Yarınını Planla', icon: '📋' },
            { id: 'h4', title: 'Alarmı Erteleme', icon: '⏰' }
        ];

        function AuthScreen() {
            const [isLogin, setIsLogin] = useState(true);
            const [role, setRole] = useState('student');
            const [name, setName] = useState("");
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [parentCode, setParentCode] = useState("");
            const [error, setError] = useState("");
            const [loading, setLoading] = useState(false);

            const handleAuth = async (e) => {
                e.preventDefault();
                setError("");
                setLoading(true);
                try {
                    let userCredential;
                    if (isLogin) {
                        userCredential = await auth.signInWithEmailAndPassword(email, password);
                    } else {
                        // Veli kodu doğrulama
                        if (role === 'parent') {
                            if (!parentCode.trim()) { setError('Lütfen öğrenci kodunu girin.'); setLoading(false); return; }

                            // 1. Önce hesabı oluştur (authenticated olmadan DB sorgusu yapılamaz)
                            userCredential = await auth.createUserWithEmailAndPassword(email, password);

                            // 2. Şimdi authenticated olarak kodu doğrula
                            try {
                                const snap = await db.ref('users').orderByChild('pairingCode').equalTo(parentCode.trim().toUpperCase()).once('value');
                                if (!snap.exists()) {
                                    // Kod geçersiz → hesabı sil
                                    await userCredential.user.delete();
                                    setError('Geçersiz Öğrenci Kodu. Lütfen kodunuzu kontrol edin.');
                                    setLoading(false);
                                    return;
                                }
                                const linkedStudentId = Object.keys(snap.val())[0];

                                await db.ref(`users/${userCredential.user.uid}/profile`).set({
                                    name: name || 'Veli',
                                    email: email,
                                    role: 'parent',
                                    linkedStudentId: linkedStudentId
                                });
                            } catch (queryErr) {
                                // Sorgu hatası → hesabı sil
                                await userCredential.user.delete();
                                throw queryErr;
                            }
                        } else {
                            userCredential = await auth.createUserWithEmailAndPassword(email, password);
                            // Check approval flags from system config
                            let finalRole = role;
                            if (role === 'student' || role === 'mentor') {
                                const sysSnap = await db.ref('system').once('value');
                                const sysData = sysSnap.val() || {};
                                if (role === 'student' && sysData.requireStudentApproval === true) finalRole = 'pending_student';
                                if (role === 'mentor' && sysData.requireMentorApproval === true) finalRole = 'pending_mentor';
                            }
                            await db.ref(`users/${userCredential.user.uid}/profile`).set({
                                name: name || 'User',
                                email: email,
                                role: finalRole
                            });
                            // Auto-seed for new students
                            if (finalRole === 'student') {
                                await db.ref(`users/${userCredential.user.uid}`).update({
                                    habits: DEFAULT_HABITS,
                                    rewards: DEFAULT_REWARDS,
                                    gold: 0
                                });
                            }
                        }
                    }
                } catch (err) {
                    setError(err.message.replace("Firebase:", "").trim());
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="flex flex-col items-center justify-center h-full bg-gray-900 text-white p-6">
                    <div className="w-full max-w-sm bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700">
                        <h1 className="text-3xl font-thin tracking-widest text-center mb-2">mylifeOS</h1>
                        <p className="text-gray-400 dark:text-slate-400 text-center text-xs tracking-wide mb-8">CLOUD EDITION</p>

                        <form onSubmit={handleAuth} className="space-y-4">
                            {!isLogin && (
                                <>
                                    <div className="flex bg-gray-700 rounded-lg p-1 mb-2">
                                        <button type="button" onClick={() => setRole('student')} className={`flex-1 py-1 rounded text-xs font-bold ${role === 'student' ? 'bg-indigo-600 text-white' : 'text-gray-400 dark:text-slate-400'}`}>Öğrenci</button>
                                        <button type="button" onClick={() => setRole('mentor')} className={`flex-1 py-1 rounded text-xs font-bold ${role === 'mentor' ? 'bg-green-600 text-white' : 'text-gray-400 dark:text-slate-400'}`}>Mentor</button>
                                        <button type="button" onClick={() => setRole('parent')} className={`flex-1 py-1 rounded text-xs font-bold ${role === 'parent' ? 'bg-amber-500 text-white' : 'text-gray-400 dark:text-slate-400'}`}>Veli</button>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 dark:text-slate-400 ml-1">İSİM</label>
                                        <input type="text" required className="w-full bg-gray-700 text-white p-3 rounded-xl mt-1 focus:ring-2 ring-indigo-500 border-none" value={name} onChange={e => setName(e.target.value)} />
                                    </div>
                                    {role === 'parent' && (
                                        <div>
                                            <label className="text-xs font-bold text-gray-500 dark:text-slate-400 ml-1">ÖĞRENCİ KODU</label>
                                            <input type="text" required maxLength={6} placeholder="6 haneli kod" className="w-full bg-gray-700 text-white p-3 rounded-xl mt-1 focus:ring-2 ring-amber-500 border-none uppercase tracking-widest text-center font-mono font-bold text-lg" value={parentCode} onChange={e => setParentCode(e.target.value.toUpperCase())} />
                                            <p className="text-gray-500 dark:text-slate-400 text-[10px] mt-1 ml-1">Öğrencinizin profilindeki 6 haneli kodu girin</p>
                                        </div>
                                    )}
                                </>
                            )}
                            <div>
                                <label className="text-xs font-bold text-gray-500 dark:text-slate-400 ml-1">E-POSTA</label>
                                <input type="email" required className="w-full bg-gray-700 text-white p-3 rounded-xl mt-1 focus:ring-2 ring-indigo-500 border-none" value={email} onChange={e => setEmail(e.target.value)} />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-gray-500 dark:text-slate-400 ml-1">ŞİFRE</label>
                                <input type="password" required className="w-full bg-gray-700 text-white p-3 rounded-xl mt-1 focus:ring-2 ring-indigo-500 border-none" value={password} onChange={e => setPassword(e.target.value)} />
                            </div>

                            {error && <div className="text-red-400 text-xs bg-red-900/30 p-2 rounded">{error}</div>}

                            <button disabled={loading} type="submit" className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl transition-all disabled:opacity-50">
                                {loading ? 'İşleniyor...' : (isLogin ? 'Giriş Yap' : 'Kayıt Ol')}
                            </button>
                        </form>

                        <div className="mt-6 text-center">
                            <button onClick={() => setIsLogin(!isLogin)} className="text-gray-400 dark:text-slate-400 text-sm hover:text-white transition">
                                {isLogin ? 'Hesabın yok mu? Kayıt Ol' : 'Zaten hesabın var mı? Giriş Yap'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }



        // --- 6 RENKLİ SİSTEM YARDIMCISI (Color + Text) ---
        const getStatusInfo = (percent, hasTasks) => {
            if (!hasTasks) return { color: "#F3F4F6", text: "Plan Yok", textColor: "#9CA3AF" }; // Boş
            if (percent === 0) return { color: "#9CA3AF", text: "Henüz Başlamadın...", textColor: "white" }; // Gri (0%)
            if (percent <= 20) return { color: "#EF4444", text: "Harekete Geç!", textColor: "white" }; // Kırmızı
            if (percent <= 40) return { color: "#F97316", text: "Isınıyorsun 🔥", textColor: "white" }; // Turuncu
            if (percent <= 60) return { color: "#EAB308", text: "Yarıladın 🚀", textColor: "white" }; // Sarı
            if (percent < 100) return { color: "#22C55E", text: "Harika Gidiyorsun", textColor: "white" }; // Yeşil
            return { color: "#06B6D4", text: "Efsane Bir Gün 💎", textColor: "white" }; // Turkuaz
        };

        const getProgressColor = (percent) => getStatusInfo(percent, true).color;

        // --- ANALYTICS COMPONENT ---
        const ProjectAnalyticsChart = ({ student }) => {
            const canvasRef = React.useRef(null);
            const [range, setRange] = useState('1m'); // 1w, 1m, 3m, 6m
            const [metric, setMetric] = useState('cumulative'); // 'cumulative' | 'velocity'
            const [chartOffset, setChartOffset] = useState(0); // 0 = current, -1 = prev window
            const [activeFilter, setActiveFilter] = useState('ALL'); // 'ALL' | project.id
            const chartInstance = React.useRef(null);

            // Techy/Dark Mode Colors
            const colors = ['#818cf8', '#f472b6', '#fbbf24', '#34d399', '#60a5fa'];

            // Reset offset when range changes
            useEffect(() => {
                setChartOffset(0);
            }, [range]);

            useEffect(() => {
                if (!student || !student.projects || student.projects.length === 0) return;
                const ctx = canvasRef.current.getContext('2d');

                const getDateKey = (date) => {
                    const year = date.getFullYear();
                    const month = String(date.getMonth() + 1).padStart(2, '0');
                    const day = String(date.getDate()).padStart(2, '0');
                    return `${year}-${month}-${day}`;
                };

                // 1. Determine Date Range based on Offset
                let days = 30;
                if (range === '1w') days = 7;
                if (range === '1m') days = 30;
                if (range === '3m') days = 90;
                if (range === '6m') days = 180;

                const now = new Date();
                const endDate = new Date(now);
                endDate.setDate(endDate.getDate() + (chartOffset * days));

                const startDate = new Date(endDate);
                startDate.setDate(startDate.getDate() - days);

                // 2. Prepare Data Structure
                const labels = [];
                const projectData = {};

                // Init project data containers
                student.projects.forEach((p, i) => {
                    projectData[p.id] = {
                        id: p.id,
                        label: p.title,
                        data: [],
                        rawValues: [],
                        totalUnit: Number(p.totalUnit) || 100, // EXCEL KORUMASI EKLENDİ
                        unit: p.unit || 'br',
                        borderColor: colors[i % colors.length],
                        backgroundColor: colors[i % colors.length] + '20',
                        borderWidth: 2,
                        pointRadius: 0,
                        pointHoverRadius: 6,
                        tension: 0.4,
                        currentRawTotal: 0
                    };
                });

                // 3. Process History
                const allDates = [];
                const iterator = new Date(startDate);
                while (iterator <= endDate) {
                    allDates.push(new Date(iterator));
                    iterator.setDate(iterator.getDate() + 1);
                }

                // 🔥 ALT GÖREVLERİ (SUBITEMS) HESAPLAYAN AKILLI FONKSİYON 🔥
                const calculateTaskGain = (task) => {
                    // Eğer alt görev (kutucuklar) varsa, işaretli olanların sayısını döndür
                    if (task.subItems && Array.isArray(task.subItems)) {
                        return task.subItems.filter(Boolean).length;
                    }
                    // Alt görev yoksa ve tek seferlik görev tamamen bittiyse hedef miktarı döndür
                    if (task.completed) {
                        return Number(task.targetAmount) || 1;
                    }
                    return 0; // Hiçbiri değilse ilerleme yok
                };

                // 3a. Calculate Initial State (Sum of all tasks BEFORE startDate)
                const projectInitialTotals = {};
                student.projects.forEach(p => projectInitialTotals[p.id] = 0);

                if (metric === 'cumulative') {
                    const startKey = getDateKey(startDate);
                    const historyKeys = Object.keys(student.history || {}).sort();

                    historyKeys.forEach(k => {
                        if (k < startKey) {
                            const dayData = student.history[k];
                            if (dayData && dayData.tasks) {
                                student.projects.forEach(p => {
                                    const gained = dayData.tasks
                                        // ID_ KORUMASI
                                        .filter(t => String(t.pid).replace("ID_", "") === String(p.id).replace("ID_", ""))
                                        .reduce((acc, t) => acc + calculateTaskGain(t), 0); // YENİ FONKSİYON KULLANILDI
                                    projectInitialTotals[p.id] += gained;
                                });
                            }
                        }
                    });
                }

                // Initialize currentRawTotal with what was done before this window + initialUnit
                student.projects.forEach(p => {
                    projectData[p.id].currentRawTotal = projectInitialTotals[p.id] + (Number(p.initialUnit) || 0);
                });

                // 3b. Process Dates in Window
                allDates.forEach(date => {
                    const k = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
                    labels.push(date.toLocaleDateString('tr-TR', { day: 'numeric', month: 'short' }));

                    const dayData = (student.history && student.history[k]) ? student.history[k] : { tasks: [] };

                    student.projects.forEach(p => {
                        const gainedToday = (dayData.tasks || [])
                            // ID_ KORUMASI
                            .filter(t => String(t.pid).replace("ID_", "") === String(p.id).replace("ID_", ""))
                            .reduce((acc, t) => acc + calculateTaskGain(t), 0); // YENİ FONKSİYON KULLANILDI

                        projectData[p.id].currentRawTotal += gainedToday;

                        // DATA LOGIC: Cumulative vs Velocity
                        if (metric === 'cumulative') {
                            const pct = Math.min(100, (projectData[p.id].currentRawTotal / projectData[p.id].totalUnit) * 100);
                            projectData[p.id].data.push(pct);
                            projectData[p.id].rawValues.push(projectData[p.id].currentRawTotal);
                        } else {
                            const dailyPct = (gainedToday / projectData[p.id].totalUnit) * 100;
                            projectData[p.id].data.push(dailyPct);
                            projectData[p.id].rawValues.push(gainedToday);
                        }
                    });
                });

                // --- FILTER LOGIC ---
                let filteredDatasets = Object.values(projectData);
                if (activeFilter !== 'ALL') {
                    // ID_ KORUMASI
                    filteredDatasets = filteredDatasets.filter(ds => String(ds.id).replace("ID_", "") === String(activeFilter).replace("ID_", ""));
                }

                // 4. Create Chart
                if (chartInstance.current) chartInstance.current.destroy();

                // Y-Axis Scale Logic
                let yMin = 0;
                let yMax = 100;

                if (metric === 'cumulative') {
                    let startValue = 100;
                    let hasData = false;

                    filteredDatasets.forEach(ds => {
                        if (ds.data.length > 0) {
                            const val = ds.data[0];
                            if (val < startValue) startValue = val;
                            hasData = true;
                        }
                    });
                    if (!hasData) startValue = 0;

                    let currentMax = 0;
                    filteredDatasets.forEach(ds => {
                        const dsMax = Math.max(...ds.data);
                        if (dsMax > currentMax) currentMax = dsMax;
                    });

                    let baseRange = 15;
                    if (range === '1w') baseRange = 5;
                    if (range === '1m') baseRange = 15;
                    if (range === '3m') baseRange = 40;
                    if (range === '6m') baseRange = 80;

                    const actualDelta = currentMax - startValue;
                    let targetRange = baseRange;
                    let attempts = 0;
                    while (actualDelta > targetRange && attempts < 50) {
                        targetRange = targetRange * 1.2;
                        attempts++;
                    }

                    yMin = startValue;
                    yMax = Math.min(startValue + targetRange, 100);

                } else {
                    yMax = undefined;
                }

                filteredDatasets.forEach(ds => {
                    if (metric === 'velocity') ds.fill = true;
                });

                chartInstance.current = new Chart(ctx, {
                    type: 'line',
                    data: { labels, datasets: filteredDatasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        scales: {
                            y: {
                                beginAtZero: metric === 'velocity',
                                min: yMin,
                                max: yMax,
                                suggestedMax: metric === 'velocity' ? 12 : undefined,
                                grid: { color: 'rgba(255,255,255,0.05)' },
                                ticks: { color: '#9ca3af' },
                                border: { display: false }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { color: '#9ca3af' },
                                border: { display: false }
                            }
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: '#1f2937',
                                titleColor: '#f3f4f6',
                                bodyColor: '#d1d5db',
                                callbacks: {
                                    label: (ctx) => {
                                        const dataset = ctx.dataset;
                                        const raw = dataset.rawValues[ctx.dataIndex];
                                        return `${dataset.label}: ${Math.round(raw)}/${dataset.totalUnit} ${dataset.unit}`;
                                    }
                                }
                            }
                        }
                    }
                });

                return () => {
                    if (chartInstance.current) chartInstance.current.destroy();
                };
            }, [student, range, metric, chartOffset, activeFilter]);

            if (!student.projects || student.projects.length === 0) return <div className="p-8 text-center text-gray-400 text-xs">Analiz için aktif hedef bulunamadı.</div>;

            return (
                <div className="bg-gray-900 p-5 rounded-3xl shadow-2xl border border-gray-800">
                    <div className="flex justify-between items-center mb-6">
                        <div>
                            <div className="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 flex items-center gap-2">
                                <span className="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span>

                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setMetric('cumulative')} className={`text-xs font-bold px-4 py-1.5 rounded-xl transition ${metric === 'cumulative' ? 'bg-indigo-500/20 text-indigo-400 ring-1 ring-indigo-500/50' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>İlerleme</button>
                                <button onClick={() => setMetric('velocity')} className={`text-xs font-bold px-4 py-1.5 rounded-xl transition ${metric === 'velocity' ? 'bg-indigo-500/20 text-indigo-400 ring-1 ring-indigo-500/50' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>Hız</button>
                            </div>
                        </div>
                        <div className="flex bg-gray-800 rounded-lg p-1 items-center">
                            <button onClick={() => setChartOffset(c => c - 1)} className="px-2 py-1 text-gray-400 hover:text-white transition">←</button>
                            {['1w', '1m', '3m', '6m'].map(r => (
                                <button key={r} onClick={() => setRange(r)} className={`px-3 py-1 text-[10px] font-bold rounded-md transition ${range === r ? 'bg-gray-700 text-white shadow-sm' : 'text-gray-500 hover:text-gray-300'}`}>{r.toUpperCase()}</button>
                            ))}
                            <button disabled={chartOffset === 0} onClick={() => setChartOffset(c => c + 1)} className={`px-2 py-1 transition ${chartOffset === 0 ? 'text-gray-700 cursor-not-allowed' : 'text-gray-400 hover:text-white'}`}>→</button>
                        </div>
                    </div>

                    <div className="relative h-64 w-full mb-4">
                        <canvas ref={canvasRef} />
                    </div>

                    {/* DARK MODE FILTER BAR */}
                    <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1 border-t border-gray-800/50 pt-4">

        const exportToExcel = (userData, fileName = 'StudentLifeOS_Yedek') => {
            try {
                const wb = XLSX.utils.book_new();

                // Sheet 1: Profil (tüm metadata)
                const profilData = [{
                    'Ad Soyad': userData.profile?.name || '',
                    'E-posta': userData.profile?.email || '',
                    'Rol': userData.profile?.role || 'student',
                    'Sınıf ID': userData.profile?.classId || '',
                    'Altın': userData.gold || 0,
                    'Mağaza Kilitli': userData.profile?.storeLocked ? 'Evet' : 'Hayır',
                    'Eşleştirme Kodu': userData.profile?.pairingCode || '',
                    'Yedek Tarihi': new Date().toLocaleString('tr-TR')
                }];
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(profilData), 'Profil');

                // Sheet 2: Hedefler (tüm alanlar)
                const hedeflerData = (userData.projects || []).map(p => ({
                    'ID': p.id,
                    'Başlık': p.title,
                    'Toplam Birim': p.totalUnit || 0,
                    'Mevcut Birim': p.currentUnit || 0,
                    'Birim': p.unit || 'Sayfa',
                    'İlerleme %': p.totalUnit > 0 ? Math.round(((p.currentUnit || 0) / p.totalUnit) * 100) : 0,
                    'Tahmini Süre (saat)': p.totalEstTime || 0,
                    'Kalan Tahmini Saat': p.totalEstTime && p.totalUnit ? Math.round((p.totalEstTime * Math.max(0, (p.totalUnit - (p.currentUnit || 0)) / p.totalUnit)) * 10) / 10 : 0,
                    'Notlar': p.notes || '',
                    'Paket mi': p.isBundle ? 'Evet' : 'Hayır',
                    'Alt Öğeler (JSON)': p.items ? JSON.stringify(p.items) : ''
                }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(
                    hedeflerData.length > 0 ? hedeflerData : [{ 'Bilgi': 'Henüz hedef yok.' }]
                ), 'Hedefler');

                // Sheet 3: Geçmiş — Görevler (her tarih, her görev, tüm alanlar)
                const gecmisData = [];
                const history = userData.history || {};
                Object.keys(history).sort().forEach(dateKey => {
                    const day = history[dateKey];
                    (day.tasks || []).forEach(t => {
                        gecmisData.push({
                            'Tarih': dateKey,
                            'ID': t.id || '',
                            'Görev': t.title || '',
                            'Tür': t.type || 'simple',
                            'Tamamlandı': t.completed ? 'Evet' : 'Hayır',
                            'Süre (dk)': t.duration || '',
                            'Başlangıç': t.startTime || '',
                            'Proje ID': t.pid || '',
                            'Proje Başlık': t.projectTitle || '',
                            'Hedef Miktar': t.targetAmount || '',
                            'Alt Öğeler (JSON)': t.subItems ? JSON.stringify(t.subItems) : '',
                            'Atayan': t.assignedBy || '',
                            'Silinebilir': t.allowDelete === undefined ? '' : (t.allowDelete ? 'Evet' : 'Hayır')
                        });
                    });
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(
                    gecmisData.length > 0 ? gecmisData : [{ 'Bilgi': 'Henüz geçmiş yok.' }]
                ), 'Geçmiş');

                // Sheet 4: Alışkanlıklar (tanımlar)
                const habitsData = (userData.habits || []).map(h => ({
                    'ID': h.id,
                    'Başlık': h.title,
                    'Emoji': h.icon || ''
                }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(
                    habitsData.length > 0 ? habitsData : [{ 'Bilgi': 'Varsayılan alışkanlıklar kullanılıyor.' }]
                ), 'Alışkanlıklar');

                // Sheet 5: Günlük Rutin Geçmişi (hangi gün hangi alışkanlık yapıldı + günlük)
                const rutinData = [];
                Object.keys(history).sort().forEach(dateKey => {
                    const day = history[dateKey];
                    (day.habits || []).forEach(hId => {
                        rutinData.push({ 'Tarih': dateKey, 'Tür': 'Alışkanlık', 'Alışkanlık ID': hId, 'Ruh Hali': '', 'Günlük Notu': '' });
                    });
                    if (day.journal) {
                        const j = typeof day.journal === 'object' ? day.journal : { mood: '', note: day.journal };
                        rutinData.push({ 'Tarih': dateKey, 'Tür': 'Günlük', 'Alışkanlık ID': '', 'Ruh Hali': j.mood || '', 'Günlük Notu': j.note || '' });
                    }
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(
                    rutinData.length > 0 ? rutinData : [{ 'Bilgi': 'Henüz rutin verisi yok.' }]
                ), 'Rutin Geçmişi');

                // Sheet 6: Ödüller / Mağaza
                const rewardsData = (userData.rewards || []).map(r => ({
                    'ID': r.id,
                    'Başlık': r.title,
                    'Maliyet': r.cost,
                    'Emoji': r.icon || ''
                }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(
                    rewardsData.length > 0 ? rewardsData : [{ 'Bilgi': 'Varsayılan ödüller kullanılıyor.' }]
                ), 'Ödüller');

                XLSX.writeFile(wb, `${fileName}.xlsx`);
                return { success: true, message: '✅ Tam yedek başarıyla indirildi! (6 sayfa)' };
            } catch (err) {
                console.error('Excel export error:', err);
                return { success: false, message: 'Hata: Excel dosyası oluşturulamadı.' };
            }
        };

        const importFromExcel = (file) => {
            return new Promise((resolve, reject) => {
                try {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const wb = XLSX.read(data, { type: 'array' });
                            const result = {};
                            const stats = { projects: 0, days: 0, habits: 0, rewards: 0 };

                            // Parse Profil
                            if (wb.SheetNames.includes('Profil')) {
                                const rows = XLSX.utils.sheet_to_json(wb.Sheets['Profil']);
                                if (rows[0]) {
                                    result.gold = Number(rows[0]['Altın']) || 0;
                                    // profile fields are informational; we don't overwrite name/email/role
                                }
                            }

                            // Parse Hedefler
                            if (wb.SheetNames.includes('Hedefler')) {
                                const rows = XLSX.utils.sheet_to_json(wb.Sheets['Hedefler']);
                                result.projects = rows
                                    .filter(r => r['Başlık'])
                                    .map(r => {
                                        const proj = {
                                            id: String(r['ID'] || Date.now() + Math.random()),
                                            title: r['Başlık'],
                                            totalUnit: Number(r['Toplam Birim']) || 0,
                                            currentUnit: Number(r['Mevcut Birim']) || 0,
                                            unit: r['Birim'] || 'Sayfa',
                                            totalEstTime: Number(r['Tahmini Süre (saat)']) || 0,
                                            notes: r['Notlar'] || ''
                                        };
                                        if (r['Paket mi'] === 'Evet') proj.isBundle = true;
                                        if (r['Alt Öğeler (JSON)']) {
                                            try { proj.items = JSON.parse(r['Alt Öğeler (JSON)']); } catch (e) { }
                                        }
                                        return proj;
                                    });
                                stats.projects = result.projects.length;
                            }

                            // Parse Geçmiş
                            if (wb.SheetNames.includes('Geçmiş')) {
                                const rows = XLSX.utils.sheet_to_json(wb.Sheets['Geçmiş']);
                                const historyObj = {};
                                rows.forEach(r => {
                                    if (!r['Tarih'] || !r['Görev']) return;
                                    const key = String(r['Tarih']);
                                    if (!historyObj[key]) historyObj[key] = { tasks: [], habits: [], journal: null };
                                    const task = {
                                        id: String(r['ID'] || Date.now() + Math.random()),
                                        title: r['Görev'],
                                        type: r['Tür'] || 'simple',
                                        completed: r['Tamamlandı'] === 'Evet',
                                        duration: String(r['Süre (dk)'] || '30'),
                                        startTime: r['Başlangıç'] || ''
                                    };
                                    if (r['Proje ID']) task.pid = String(r['Proje ID']);
                                    if (r['Proje Başlık']) task.projectTitle = r['Proje Başlık'];
                                    if (r['Hedef Miktar']) task.targetAmount = Number(r['Hedef Miktar']);
                                    if (r['Alt Öğeler (JSON)']) {
                                        try { task.subItems = JSON.parse(r['Alt Öğeler (JSON)']); } catch (e) { }
                                    }
                                    if (r['Atayan']) task.assignedBy = r['Atayan'];
                                    if (r['Silinebilir'] === 'Evet') task.allowDelete = true;
                                    if (r['Silinebilir'] === 'Hayır') task.allowDelete = false;
                                    historyObj[key].tasks.push(task);
                                });
                                result.history = historyObj;
                                stats.days = Object.keys(historyObj).length;
                            }

                            // Parse Rutin Geçmişi (merge into history)
                            if (wb.SheetNames.includes('Rutin Geçmişi')) {
                                const rows = XLSX.utils.sheet_to_json(wb.Sheets['Rutin Geçmişi']);
                                if (!result.history) result.history = {};
                                rows.forEach(r => {
                                    if (!r['Tarih']) return;
                                    const key = String(r['Tarih']);
                                    if (!result.history[key]) result.history[key] = { tasks: [], habits: [], journal: null };
                                    if (r['Tür'] === 'Alışkanlık' && r['Alışkanlık ID']) {
                                        result.history[key].habits.push(String(r['Alışkanlık ID']));
                                    }
                                    if (r['Tür'] === 'Günlük') {
                                        result.history[key].journal = { mood: r['Ruh Hali'] || '', note: r['Günlük Notu'] || r['Günlük'] || '' };
                                    }
                                });
                            }

                            // Parse Alışkanlıklar
                            if (wb.SheetNames.includes('Alışkanlıklar')) {
                                const rows = XLSX.utils.sheet_to_json(wb.Sheets['Alışkanlıklar']);
                                const habits = rows.filter(r => r['Başlık']).map(r => ({
                                    id: String(r['ID'] || 'h_' + Date.now() + Math.random()),
                                    title: r['Başlık'],
                                    icon: r['Emoji'] || '✨'
                                }));
                                if (habits.length > 0) {
                                    result.habits = habits;
                                    stats.habits = habits.length;
                                }
                            }

                            // Parse Ödüller
                            if (wb.SheetNames.includes('Ödüller')) {
                                const rows = XLSX.utils.sheet_to_json(wb.Sheets['Ödüller']);
                                const rewards = rows.filter(r => r['Başlık']).map(r => ({
                                    id: String(r['ID'] || Date.now() + Math.random()),
                                    title: r['Başlık'],
                                    cost: Number(r['Maliyet']) || 0,
                                    icon: r['Emoji'] || '🎁'
                                }));
                                if (rewards.length > 0) {
                                    result.rewards = rewards;
                                    stats.rewards = rewards.length;
                                }
                            }

                            resolve({ data: result, stats, success: true });
                        } catch (parseErr) {
                            console.error('Import parse error:', parseErr);
                            reject({ success: false, message: 'Hata: Geçersiz dosya formatı. Lütfen uygun bir Excel dosyası seçin.' });
                        }
                    };
                    reader.onerror = () => reject({ success: false, message: 'Hata: Dosya okunamadı.' });
                    reader.readAsArrayBuffer(file);
                } catch (err) {
                    reject({ success: false, message: 'Hata: Dosya işlenemedi.' });
                }
            });
        };

        const exportAllStudents = (students, fileName = 'Kurum_Yedek') => {
            try {
                const wb = XLSX.utils.book_new();

                // Sheet 1: Öğrenci Listesi (özet + UID)
                const listeData = students.map(s => {
                    const projects = s.projects || [];
                    const totalUnits = projects.reduce((sum, p) => sum + (p.totalUnit || 0), 0);
                    const currentUnits = projects.reduce((sum, p) => sum + (p.currentUnit || 0), 0);
                    const historyDays = s.history ? Object.keys(s.history).length : 0;

                    const completedTasks = s.history ? Object.values(s.history).reduce((sum, d) => sum + (d.tasks?.filter(t => t.completed)?.length || 0), 0) : 0;
                    const goalNames = projects.map(p => p.title).join(', ');
                    return {
                        'UID': s.uid || '',
                        'Ad Soyad': s.profile?.name || '',
                        'E-posta': s.profile?.email || '',
                        'Sınıf ID': s.profile?.classId || '',
                        'Altın': s.gold || 0,

                        'Mağaza Kilitli': s.profile?.storeLocked ? 'Evet' : 'Hayır'
                    };
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(listeData), 'Öğrenci Listesi');

                // Sheet 2: Tüm Hedefler (her öğrencinin tüm hedefleri)
                const tumHedefler = [];

                ), 'Tüm Hedefler');

                // Sheet 3: Tüm Geçmiş (her öğrencinin tüm görev geçmişi)
                const tumGecmis = [];
                students.forEach(s => {
                    const history = s.history || {};
                    Object.keys(history).sort().forEach(dateKey => {

                                'Alt Öğeler (JSON)': t.subItems ? JSON.stringify(t.subItems) : '',
                                'Atayan': t.assignedBy || '',
                                'Silinebilir': t.allowDelete === undefined ? '' : (t.allowDelete ? 'Evet' : 'Hayır')
                            });
                        });
                    });
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(
                    tumGecmis.length > 0 ? tumGecmis : [{ 'Bilgi': 'Henüz geçmiş verisi yok.' }]
                ), 'Tüm Geçmiş');

                // Sheet 4: Tüm Rutin Geçmişi
                const tumRutin = [];
                students.forEach(s => {
                    const history = s.history || {};
                    Object.keys(history).sort().forEach(dateKey => {

                XLSX.writeFile(wb, `${fileName}.xlsx`);

            const completionRate = totalCount > 0 ? Math.round((completedCount / totalCount) * 100) : 0;

            const dayStatus = getStatusInfo(completionRate, totalCount > 0);

            const [currentMonth, setCurrentMonth] = React.useState(new Date());
            const getDaysInMonth = (date) => {
                const year = date.getFullYear();
                const month = date.getMonth();
                const days = new Date(year, month + 1, 0).getDate();
                const firstDay = new Date(year, month, 1).getDay();
                const firstDayAdjusted = firstDay === 0 ? 6 : firstDay - 1;
                return { days, firstDay: firstDayAdjusted };
            };
            const { days: daysInMonth, firstDay: firstDayOfMonth } = getDaysInMonth(currentMonth);

            // Streak hesaplama
            const calculateStreak = (hist) => {
                const gdk = (d) => {
                    const y = d.getFullYear();
                    const m = String(d.getMonth() + 1).padStart(2, '0');
                    const dd = String(d.getDate()).padStart(2, '0');
                    return `${y}-${m}-${dd}`;
                };
                const isDayQualified = (dayData) => {
                    if (!dayData) return false;
                    if (dayData.frozen === true) return true;
                    const tasks = dayData.tasks || [];
                    const hasTask = tasks.some(t => t.completed || (t.subItems && t.subItems.some(Boolean)));
                    const hasHabit = (dayData.habits || []).length > 0;
                    return hasTask && hasHabit;
                };
                let streak = 0;
                const today = new Date();
                const todayData = hist[gdk(today)];
                let startFromToday = isDayQualified(todayData);
                if (startFromToday) streak = 1;
                const cursor = new Date(today);
                cursor.setDate(cursor.getDate() - 1);
                for (let i = 0; i < 365; i++) {
                    const key = gdk(cursor);
                    if (isDayQualified(hist[key])) {
                        streak++;
                    } else {
                        if (!startFromToday && i === 0) {
                            cursor.setDate(cursor.getDate() - 1);
                            continue;
                        }
                        break;
                    }
                    cursor.setDate(cursor.getDate() - 1);

                            return acc + ((Number(t.duration) || 0) * (doneCount / t.subItems.length));
                        }
                        return acc;
                    }, 0);

                return Math.round(totalMin);

                monday.setDate(now.getDate() + diffToMonday);

                let totalRawMinutes = 0;

                Object.keys(historyObj).forEach(dateStr => {
                    const dateObj = new Date(dateStr);
                    if (dateObj >= monday && dateObj <= now) {
                        const dayData = historyObj[dateStr];
                        if (dayData && dayData.tasks && Array.isArray(dayData.tasks)) {
                            dayData.tasks.forEach(t => {
                                if (t.completed) {
                                    totalRawMinutes += (Number(t.duration) || 0);
                                }
                                if (!t.completed && t.subItems && t.subItems.length > 0) {
                                    const doneCount = t.subItems.filter(Boolean).length;
                                    const progress = doneCount / t.subItems.length;
                                    totalRawMinutes += ((Number(t.duration) || 0) * progress);
                                }
                            });
                        }
                    }
                });

                const hrs = Math.floor(totalMinutes / 60);

                                        // ── 1. BACKGROUND: Dual-tone vertical gradient ──

                                        bgGrad.addColorStop(0, tier.canvasBg[0]);

                                        ctx.fillStyle = bgGrad;

                                        const starPositions = [

                                            ctx.fill();

                                        ctx.fillStyle = 'rgba(255,255,255,0.15)';
                                        ctx.fillRect(80, 185, 920, 2);

                                        ctx.fillText(studentName.toUpperCase(), 540, 255);

                                        // Separator line below name

                                        ctx.fillRect(80, 280, 920, 2);

                                        ctx.fillText(tier.emoji, 540, 520);

                                        ctx.font = '900 72px system-ui, sans-serif';
                                        ctx.fillStyle = 'rgba(255,255,255,0.9)';
                                        ctx.fillText(tier.title, 540, 700);

                                        ctx.fillStyle = 'rgba(255,255,255,0.55)';
                                        ctx.fillText('BU HAFTA ODAKLANILAN SÜRE', 540, 820);

                                        // ── 9. TIME VALUE with NEON GLOW ──
                                        ctx.save();
                                        ctx.shadowColor = 'rgba(255,255,255,0.65)';
                                        ctx.shadowBlur = 48;
                                        ctx.font = '900 168px system-ui, sans-serif';
                                        ctx.fillStyle = '#ffffff';
                                        const timeStr = `${totalHours} SAAT ${totalMinutes} DK`;
                                        ctx.fillText(timeStr, 540, 1020);
                                        ctx.restore();

                                        ctx.fillRect(140, 1060, 800, 2);

                                        // ── 11. MENTOR QUOTE (wrapped, italic) ──
                                        const wrapText = (context, text, x, y, maxWidth, lineHeight, font, fillStyle) => {
                                            context.font = font;
                                            context.fillStyle = fillStyle;
                                            const words = text.split(' ');
                                            let line = '';
                                            let lines = [];
                                            words.forEach(word => {
                                                const testLine = line + word + ' ';
                                                const metrics = context.measureText(testLine);
                                                if (metrics.width > maxWidth && line !== '') {
                                                    lines.push(line.trim());
                                                    line = word + ' ';
                                                } else {
                                                    line = testLine;
                                                }
                                            });
                                            lines.push(line.trim());
                                            const totalH = lines.length * lineHeight;
                                            const startY = y - (totalH / 2) + lineHeight / 2;
                                            lines.forEach((l, i) => {
                                                const drawLine = (i === 0 ? '\"' : '') + l + (i === lines.length - 1 ? '\"' : '');
                                                context.fillText(drawLine, x, startY + i * lineHeight);
                                            });
                                        };

                                            540, 1280,
